# Project-specific allowlist for `typos` (crate-ci/typos).
# These are deliberate hyphenated prefixes and accepted variant spellings
# that the default dictionary otherwise flags.

[files]
# `vendor/` holds third-party crates copied verbatim for a local patch (e.g.
# the symphonia-metadata APE-overflow guard). Their comments/docs are upstream's
# and carry pre-existing typos we don't own or fix — skip them so our own
# sources stay the only thing typos gates.
#
# The benchmark manifests and result artifacts are verbatim ASR reference and
# hypothesis transcripts (LibriSpeech, Golos, OpenSTT, ...). They contain
# dialect / archaic / misrecognized spellings ("nothin", "answerd", "jus") that
# are the data, not typos we own — spell-checking them is meaningless.
extend-exclude = [
    "vendor/",
    "benchmark/manifests/",
    "benchmark/results_full/",
    # Raw telephony fixtures (G.711 A-law/μ-law, G.722) are headerless binary
    # streams with no NUL bytes in the sniffed window, so typos treats them as
    # text and flags random byte sequences as words.
    "crates/gigastt/tests/fixtures/telephony/",
]

[default.extend-words]
# "mis-sized" / "mis-ordered" — legitimate hyphenated prefix usage.
mis = "mis"
# "unparseable" — accepted variant of "unparsable".
unparseable = "unparseable"
# "ANE" — Apple Neural Engine (CoreML hardware), used in benchmark/latency_note.md.
ane = "ane"
# "daa" — substring of the git short SHA `8daa9a9` referenced in latency notes.
daa = "daa"
# "eazy" — the artist "G-Eazy" appearing verbatim in an ASR hypothesis transcript.
eazy = "eazy"

[default.extend-identifiers]
# "hel\0lo" — intentional test string with embedded NUL byte.
hel = "hel"
# "from_mmaped_safetensors" — candle_nn API name (memory-mapped safetensors loader).
from_mmaped_safetensors = "from_mmaped_safetensors"
