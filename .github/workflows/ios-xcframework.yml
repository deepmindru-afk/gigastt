name: iOS xcframework

# Builds GigasttFFI.xcframework (iOS device arm64 + simulator arm64/x86_64 +
# macOS arm64),
# attaches the zip to a GitHub release, then rewrites the SwiftPM binaryTarget
# url + checksum in packaging/swift/Package.swift and commits that to main
# (only when dispatched from main). A follow-up job verifies the published
# package resolves end to end on a clean runner.
#
# The release tag passed as input must already exist (create the tag/release
# first, then dispatch this workflow against it).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach GigasttFFI.xcframework to (e.g. v0.9.0)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# softprops/action-gh-release updates the existing release to attach the
# xcframework zip; the GITHUB_TOKEN needs `contents: write` or the API call
# 403s with "Resource not accessible by integration".
permissions:
  contents: write

jobs:
  build-xcframework:
    name: Build GigasttFFI.xcframework
    runs-on: macos-14
    outputs:
      # "true" when the package was mirrored to ekhodzitsky/gigastt-swift in
      # this run (consumed by the verify-spm job).
      mirrored: ${{ steps.mirror.outputs.mirrored }}
    env:
      # GitHub Actions forbids referencing `secrets.*` in `if:` conditions
      # directly; expose presence as a boolean env var at job scope instead.
      HAS_MINISIGN_KEY: ${{ secrets.MINISIGN_SECRET_KEY != '' && 'true' || 'false' }}
      HAS_SWIFT_PACKAGE_TOKEN: ${{ secrets.SWIFT_PACKAGE_TOKEN != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v7

      # Fail fast: a bad SWIFT_PACKAGE_TOKEN is otherwise discovered only on
      # the mirror push, after a ~40-minute build (public-repo clones accept
      # any token, so the clone itself is NOT a validation). Check auth +
      # Contents:write on the mirror repo before doing any expensive work.
      - name: Validate SWIFT_PACKAGE_TOKEN
        if: github.ref == 'refs/heads/main' && env.HAS_SWIFT_PACKAGE_TOKEN == 'true'
        shell: bash
        env:
          SWIFT_PACKAGE_TOKEN: ${{ secrets.SWIFT_PACKAGE_TOKEN }}
        run: |
          set -euo pipefail
          BODY="$RUNNER_TEMP/gigastt-swift-repo.json"
          CODE="$(curl -sS -o "$BODY" -w '%{http_code}' \
            -H "Authorization: Bearer ${SWIFT_PACKAGE_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/ekhodzitsky/gigastt-swift)"
          if [ "$CODE" != "200" ]; then
            echo "::error ::SWIFT_PACKAGE_TOKEN was rejected by the GitHub API (HTTP $CODE). Recreate the secret with a valid fine-grained PAT (Contents: write on ekhodzitsky/gigastt-swift)."
            exit 1
          fi
          if [ "$(jq -r '.permissions.push // false' "$BODY")" != "true" ]; then
            echo "::error ::SWIFT_PACKAGE_TOKEN is valid but lacks Contents:write on ekhodzitsky/gigastt-swift."
            exit 1
          fi
          echo "SWIFT_PACKAGE_TOKEN validated (auth + Contents:write on gigastt-swift)."

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin

      - name: Install protoc
        run: brew install protobuf

      - name: Install cbindgen
        run: cargo install --locked --version 0.29.4 cbindgen

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ios
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Each iOS target produces a self-contained static archive: ONNX Runtime
      # is statically linked by `ort`, so no vendored native library is needed.
      - name: Build staticlib (device arm64)
        run: cargo build --release -p gigastt-ffi --target aarch64-apple-ios

      - name: Build staticlib (simulator arm64)
        run: cargo build --release -p gigastt-ffi --target aarch64-apple-ios-sim

      # ort's pyke prebuilts miss x86_64-apple-ios (Intel simulator), and
      # ort-sys's apple.rs only wires ORT_IOS_XCFWK_PATH for the arm64 device/sim
      # triples — the Intel-sim slice otherwise falls through to the "no prebuilt"
      # error. ORT_LIB_LOCATION + ORT_PREFER_DYNAMIC_LINK make ort-sys emit a
      # plain `-l onnxruntime` (deferred to the consumer's app link) instead of
      # erroring. We build ONLY the staticlib crate-type here: the xcframework
      # consumes the .a (onnxruntime is resolved at the consumer link, exactly
      # like the arm64 slices), whereas `cargo build` would also link the cdylib,
      # which needs onnxruntime's full x86_64 symbol closure that the pyke prebuilt
      # doesn't ship for this target.
      - name: Build staticlib (simulator x86_64)
        env:
          ORT_PREFER_DYNAMIC_LINK: "1"
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/ort-x64-stub"
          ORT_LIB_LOCATION="$RUNNER_TEMP/ort-x64-stub" \
            cargo rustc --release -p gigastt-ffi --target x86_64-apple-ios --crate-type staticlib

      # macOS arm64 (Apple Silicon): the pyke prebuilt for aarch64-apple-darwin
      # is a static libonnxruntime.a exactly like the iOS ones, so the slice is
      # self-contained — no vendored dylib, no extra link flags. There is no
      # x86_64-apple-darwin prebuilt upstream, so the macOS slice stays
      # arm64-only (no universal lipo step).
      - name: Build staticlib (macOS arm64)
        run: cargo build --release -p gigastt-ffi --target aarch64-apple-darwin

      # Regenerate the C header from the FFI crate, then stage a Headers/ dir
      # (gigastt.h + module.modulemap) shared by every xcframework slice.
      - name: Generate header + stage Headers/
        run: |
          set -euo pipefail
          mkdir -p build/Headers
          cbindgen \
            --config crates/gigastt-ffi/cbindgen.toml \
            --crate gigastt-ffi \
            --output build/Headers/gigastt.h \
            crates/gigastt-ffi
          cp packaging/swift/module/module.modulemap build/Headers/module.modulemap
          cat build/Headers/gigastt.h

      # Fuse the two simulator slices (arm64 + x86_64) into a single fat
      # simulator archive; xcframework requires one library per platform.
      - name: Create fat simulator library
        run: |
          set -euo pipefail
          mkdir -p build/sim
          lipo -create \
            target/aarch64-apple-ios-sim/release/libgigastt_ffi.a \
            target/x86_64-apple-ios/release/libgigastt_ffi.a \
            -output build/sim/libgigastt_ffi.a
          lipo -info build/sim/libgigastt_ffi.a

      - name: Create xcframework
        run: |
          set -euo pipefail
          rm -rf GigasttFFI.xcframework
          xcodebuild -create-xcframework \
            -library target/aarch64-apple-ios/release/libgigastt_ffi.a \
            -headers build/Headers \
            -library build/sim/libgigastt_ffi.a \
            -headers build/Headers \
            -library target/aarch64-apple-darwin/release/libgigastt_ffi.a \
            -headers build/Headers \
            -output GigasttFFI.xcframework
          plutil -p GigasttFFI.xcframework/Info.plist

      # Smoke-test the macOS slice before publishing: a scratch executable
      # package consumes the just-built xcframework by path (the documented
      # local-development mode) and calls into the C ABI through the Swift
      # wrapper. Engine creation against a missing model dir must fail cleanly
      # with NULL — reaching that error path proves the statically linked
      # archive loads and runs on macOS. Fails the build if the macOS slice is
      # missing or broken, so a bad zip never reaches the release.
      - name: Smoke-test macOS slice
        shell: bash
        run: |
          set -euo pipefail
          SMOKE="$RUNNER_TEMP/gigastt-smoke"
          mkdir -p "$SMOKE/Sources/smoke"
          cp -R GigasttFFI.xcframework "$SMOKE/"
          cp -R packaging/swift/Sources/GigaSTT "$SMOKE/Sources/GigaSTT"
          cat > "$SMOKE/Package.swift" <<'EOF'
          // swift-tools-version:5.9
          import PackageDescription
          // Mirrors packaging/swift/Package.swift (path binaryTarget instead of
          // the released url) plus an executable target that calls into the C ABI.
          let package = Package(
              name: "smoke",
              platforms: [.macOS(.v13)],
              targets: [
                  .binaryTarget(name: "GigasttFFI", path: "GigasttFFI.xcframework"),
                  .target(
                      name: "GigaSTT",
                      dependencies: ["GigasttFFI"],
                      linkerSettings: [
                          .linkedLibrary("c++")
                      ]
                  ),
                  .executableTarget(name: "smoke", dependencies: ["GigaSTT"])
              ]
          )
          EOF
          cat > "$SMOKE/Sources/smoke/main.swift" <<'EOF'
          import GigaSTT

          do {
              _ = try Engine(modelDir: "/nonexistent-model-dir")
              fatalError("expected engineLoadFailed for a missing model dir")
          } catch {
              print("macOS smoke OK: C ABI linked, missing model dir rejected (\(error))")
          }
          EOF
          swift build --package-path "$SMOKE"
          swift run --package-path "$SMOKE" smoke

      - name: Zip xcframework
        run: |
          set -euo pipefail
          ditto -c -k --keepParent GigasttFFI.xcframework GigasttFFI.xcframework.zip
          ls -la GigasttFFI.xcframework.zip

      - name: Compute SwiftPM checksum
        id: checksum
        run: |
          set -euo pipefail
          CHECKSUM="$(swift package --package-path packaging/swift compute-checksum GigasttFFI.xcframework.zip)"
          echo "checksum=${CHECKSUM}" >> "$GITHUB_OUTPUT"
          echo "Checksum: ${CHECKSUM}"

      # Optional minisign signature for the zip. Degrades to a warning when the
      # signing secret is absent (forks, preview runs) so the build never fails.
      - name: Sign zip with minisign
        if: env.HAS_MINISIGN_KEY == 'true'
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          set -euo pipefail
          brew install minisign
          printf '%s\n' "$MINISIGN_SECRET_KEY" > minisign.key
          chmod 600 minisign.key
          printf '%s\n' "$MINISIGN_PASSWORD" | \
            minisign -Sm GigasttFFI.xcframework.zip -s minisign.key \
              -c "gigastt ios xcframework ${{ inputs.tag }}" \
              -t "gigastt GigasttFFI.xcframework.zip ${{ inputs.tag }}"
          rm -f minisign.key
          ls -la GigasttFFI.xcframework.zip.minisig

      - name: Warn on missing minisign secret
        if: env.HAS_MINISIGN_KEY != 'true'
        run: |
          echo "::warning ::MINISIGN_SECRET_KEY not configured — GigasttFFI.xcframework.zip will not carry a minisign signature."

      - name: Attach to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          fail_on_unmatched_files: true
          files: |
            GigasttFFI.xcframework.zip
            GigasttFFI.xcframework.zip.minisig

      # Keep the committed manifest in lockstep with the published asset:
      # substitute the fresh url/checksum into Package.swift and push to main.
      # The regexes match both the REPLACE_WITH_* placeholders and the values
      # from a previous run, so the step is idempotent. Skipped for dispatches
      # from non-main branches (test builds) so they cannot pollute main.
      - name: Update Package.swift url/checksum
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          ASSET_URL: https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag }}/GigasttFFI.xcframework.zip
          CHECKSUM: ${{ steps.checksum.outputs.checksum }}
        run: |
          set -euo pipefail
          # The build above takes long enough that the dispatch-time checkout
          # may have fallen behind main; rebase onto the current tip first.
          git fetch --depth=1 origin main
          git reset --hard origin/main
          python3 - <<'PY'
          import os, re, pathlib
          url = os.environ["ASSET_URL"]
          checksum = os.environ["CHECKSUM"]
          p = pathlib.Path("packaging/swift/Package.swift")
          text = p.read_text()
          text, n_url = re.subn(r'(url:\s*")[^"]*(")', lambda m: m.group(1) + url + m.group(2), text, count=1)
          text, n_sum = re.subn(r'(checksum:\s*")[^"]*(")', lambda m: m.group(1) + checksum + m.group(2), text, count=1)
          if n_url != 1 or n_sum != 1:
              raise SystemExit(f"expected exactly 1 url and 1 checksum substitution, got {n_url}/{n_sum}")
          p.write_text(text)
          print(f"url -> {url}")
          print(f"checksum -> {checksum}")
          PY
          sed -n '18,22p' packaging/swift/Package.swift

      - name: Commit + push Package.swift
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if git diff --quiet packaging/swift/Package.swift; then
            echo "Package.swift already up to date for $TAG — nothing to commit"
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add packaging/swift/Package.swift
          git commit -m "chore(spm): pin Package.swift to $TAG

          Auto-generated by .github/workflows/ios-xcframework.yml after the
          GigasttFFI.xcframework.zip asset was attached to the $TAG release."
          git push origin HEAD:main

      # Publish the package to the dedicated SwiftPM repo (SPM requires
      # Package.swift at the repository root, so the monorepo subdirectory
      # cannot be consumed via URL). Copies the already-substituted manifest,
      # the wrapper sources, README and LICENSE, then tags the mirror with the
      # same version as the engine release. An existing tag is never moved —
      # a re-run for the same tag updates main only and warns.
      - name: Mirror package to gigastt-swift
        id: mirror
        if: github.ref == 'refs/heads/main' && env.HAS_SWIFT_PACKAGE_TOKEN == 'true'
        shell: bash
        env:
          TAG: ${{ inputs.tag }}
          SWIFT_PACKAGE_TOKEN: ${{ secrets.SWIFT_PACKAGE_TOKEN }}
        run: |
          set -euo pipefail
          SWIFT_DIR="$RUNNER_TEMP/gigastt-swift"
          git clone --depth 1 \
            "https://x-access-token:${SWIFT_PACKAGE_TOKEN}@github.com/ekhodzitsky/gigastt-swift.git" \
            "$SWIFT_DIR"
          cp packaging/swift/Package.swift "$SWIFT_DIR/Package.swift"
          rm -rf "$SWIFT_DIR/Sources"
          cp -R packaging/swift/Sources "$SWIFT_DIR/Sources"
          cp packaging/swift/README.md "$SWIFT_DIR/README.md"
          cp LICENSE "$SWIFT_DIR/LICENSE"
          cd "$SWIFT_DIR"
          if git diff --quiet && git diff --cached --quiet; then
            echo "gigastt-swift already up to date — nothing to commit"
          else
            git config user.name  'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add -A
            git commit -m "chore: mirror packaging/swift from gigastt $TAG

            Auto-generated by .github/workflows/ios-xcframework.yml in
            ekhodzitsky/gigastt after the $TAG xcframework release."
            git push origin main
          fi
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "::warning ::tag $TAG already exists in gigastt-swift — leaving it untouched"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi
          echo "mirrored=true" >> "$GITHUB_OUTPUT"

      - name: Warn on missing SWIFT_PACKAGE_TOKEN
        if: github.ref == 'refs/heads/main' && env.HAS_SWIFT_PACKAGE_TOKEN != 'true'
        run: |
          echo "::warning ::SWIFT_PACKAGE_TOKEN not configured — gigastt-swift will not be mirrored/tagged for ${{ inputs.tag }}."

      # The url/checksum were already written into packaging/swift/Package.swift
      # by the steps above (when dispatched from main); print them here only
      # for visibility in the run summary.
      - name: Job summary
        run: |
          set -euo pipefail
          URL="https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag }}/GigasttFFI.xcframework.zip"
          {
            echo "## GigasttFFI.xcframework published"
            echo ""
            echo "\`packaging/swift/Package.swift\` on main now carries:"
            echo ""
            echo '```swift'
            echo ".binaryTarget("
            echo "    name: \"GigasttFFI\","
            echo "    url: \"${URL}\","
            echo "    checksum: \"${{ steps.checksum.outputs.checksum }}\""
            echo ")"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # E2E: on a clean runner, resolve the package exactly as committed to main —
  # SPM downloads the just-published xcframework zip and verifies its checksum.
  verify-spm:
    name: Verify SPM package resolves
    needs: build-xcframework
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: swift package resolve
        run: swift package --package-path packaging/swift resolve

      # Stronger E2E after a mirrored run: a scratch consumer package resolves
      # the gigastt-swift repo by semver tag, exactly as an integrator would.
      - name: Resolve as remote consumer (gigastt-swift tag)
        if: needs.build-xcframework.outputs.mirrored == 'true'
        shell: bash
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          WORK="$RUNNER_TEMP/spm-consumer"
          mkdir -p "$WORK/Sources/Consumer"
          cat > "$WORK/Package.swift" <<EOF
          // swift-tools-version:5.9
          import PackageDescription
          let package = Package(
              name: "Consumer",
              platforms: [.iOS(.v15)],
              dependencies: [
                  .package(url: "https://github.com/ekhodzitsky/gigastt-swift", from: "$VERSION")
              ],
              targets: [
                  .target(name: "Consumer", dependencies: [
                      .product(name: "GigaSTT", package: "gigastt-swift")
                  ])
              ]
          )
          EOF
          echo 'import GigaSTT' > "$WORK/Sources/Consumer/dummy.swift"
          swift package --package-path "$WORK" resolve
