# Build + publish the gigastt Android library (AAR) via UniFFI Kotlin.
#
# EXPERIMENTAL — this pipeline has NOT been validated end-to-end on a real
# Android toolchain (no NDK/Gradle in the authoring environment). The Rust side
# is proven (the `Android FFI Build` CI already cross-builds gigastt-ffi via
# cargo-ndk, and gigastt-uniffi is the same kind of cdylib); the Gradle/Maven
# assembly + publish steps below follow the canonical UniFFI-Android pattern but
# should be verified by a maintainer with an Android environment before relying
# on a published AAR. Manual (`workflow_dispatch`).
#
# Packages, per ABI, libgigastt_uniffi.so (onnxruntime statically linked, so
# self-contained) + the UniFFI-generated Kotlin into an AAR. The ~215 MB model
# is side-loaded at runtime, not bundled.
name: Android AAR

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to attach the AAR to (e.g. v2.10.0)'
        required: false
        type: string
      publish:
        description: 'Publish the AAR to Maven (requires Maven/Sonatype secrets)'
        type: boolean
        default: false

# contents: write so the built AAR can be attached to an existing GitHub release.
permissions:
  contents: write

jobs:
  aar:
    runs-on: ubuntu-latest
    env:
      HAS_MAVEN_CREDS: ${{ secrets.MAVEN_CENTRAL_USERNAME != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Install cargo-ndk
        run: cargo install --locked --version 4.1.2 cargo-ndk

      # The GitHub-hosted ubuntu image ships an Android SDK + NDK; expose the NDK
      # to cargo-ndk.
      - name: Locate Android NDK
        run: echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"

      # ort's pyke prebuilts cover only aarch64-linux-android for Android;
      # armeabi-v7a and x86_64-linux-android have no prebuilt, so the plain
      # `cargo ndk` build fails on those ABIs. Pull the ABI-matched official
      # Microsoft AAR (onnxruntime 1.24.2 — the version ort 2.0.0-rc.12 pins) and
      # expose one lib dir per ABI. ort then dynamic-links libonnxruntime.so via
      # ORT_LIB_LOCATION + ORT_PREFER_DYNAMIC_LINK, and the .so is packaged into
      # jniLibs next to our cdylib. Using the AAR for all three ABIs keeps them
      # on one ABI-identical onnxruntime build.
      - name: Fetch onnxruntime 1.24.2 Android libs
        run: |
          set -euo pipefail
          ORT_VER=1.24.2
          curl -fsSL -o ort-android.aar \
            "https://repo1.maven.org/maven2/com/microsoft/onnxruntime/onnxruntime-android/${ORT_VER}/onnxruntime-android-${ORT_VER}.aar"
          for abi in arm64-v8a armeabi-v7a x86_64; do
            d="$RUNNER_TEMP/ort-lib/$abi"
            mkdir -p "$d"
            unzip -p ort-android.aar "jni/$abi/libonnxruntime.so" > "$d/libonnxruntime.so"
            test -s "$d/libonnxruntime.so"
          done
          echo "ORT_ANDROID_LIB_ROOT=$RUNNER_TEMP/ort-lib" >> "$GITHUB_ENV"

      # Native libraries: one libgigastt_uniffi.so per ABI, placed where the
      # Gradle module expects them (src/main/jniLibs/<abi>/). Each ABI is built
      # separately so it can point ORT_LIB_LOCATION at its own onnxruntime .so
      # (a single 3-target `cargo ndk` call cannot vary env per target). The
      # onnxruntime .so is then shipped alongside our cdylib in each ABI dir;
      # Android's dynamic linker resolves libonnxruntime.so from the same
      # jniLibs/<abi>/ folder at load time.
      - name: Build native libs (3 ABIs)
        env:
          ORT_PREFER_DYNAMIC_LINK: "1"
        run: |
          set -euo pipefail
          for abi in arm64-v8a armeabi-v7a x86_64; do
            ORT_LIB_LOCATION="$ORT_ANDROID_LIB_ROOT/$abi" \
            cargo ndk -t "$abi" \
              -o packaging/android/gigastt/src/main/jniLibs \
              build --release -p gigastt-uniffi
            cp "$ORT_ANDROID_LIB_ROOT/$abi/libonnxruntime.so" \
               "packaging/android/gigastt/src/main/jniLibs/$abi/"
          done

      # UniFFI Kotlin bindings: read the metadata from a HOST build of the
      # cdylib (arch-independent) and generate into the Gradle module's source.
      # CARGO_PROFILE_RELEASE_STRIP=false: uniffi >= 0.29 library-mode bindgen
      # finds the interface metadata via exported symbols that `strip = true`
      # removes on ELF/Linux ("No UniFFI metadata found"); the host lib scanned
      # here must keep them. The shipped per-ABI jniLibs stay stripped (built by
      # the earlier step) — they don't need metadata at runtime.
      - name: Generate Kotlin bindings
        env:
          CARGO_PROFILE_RELEASE_STRIP: "false"
        run: |
          cargo build --release -p gigastt-uniffi
          HOST_LIB=$(ls target/release/libgigastt_uniffi.so target/release/libgigastt_uniffi.dylib 2>/dev/null | head -1)
          cargo run --release -p gigastt-uniffi --bin uniffi-bindgen -- \
            generate --library "$HOST_LIB" --language kotlin \
            --out-dir packaging/android/gigastt/src/main/kotlin

      - name: Assemble AAR
        working-directory: packaging/android
        run: |
          chmod +x ./gradlew 2>/dev/null || true
          gradle :gigastt:assembleRelease --no-daemon

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: gigastt-aar
          path: packaging/android/gigastt/build/outputs/aar/*.aar
          if-no-files-found: error

      # Attach the built AAR to the given GitHub release (mirrors the iOS
      # xcframework distribution). Consumers download the .aar directly — no
      # Maven Central / Sonatype namespace / GPG signing required.
      - name: Stage AAR for release
        if: ${{ inputs.tag != '' }}
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          cp "$(ls packaging/android/gigastt/build/outputs/aar/*.aar | head -1)" "gigastt-${VERSION}.aar"
          ls -la gigastt-*.aar

      - name: Attach AAR to release
        if: ${{ inputs.tag != '' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          fail_on_unmatched_files: true
          files: gigastt-*.aar

      - name: Warn on missing Maven credentials
        if: ${{ inputs.publish && env.HAS_MAVEN_CREDS != 'true' }}
        run: echo "::warning ::Maven credentials not configured — skipping AAR publish."

      - name: Publish to Maven
        if: ${{ inputs.publish && env.HAS_MAVEN_CREDS == 'true' }}
        working-directory: packaging/android
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: gradle :gigastt:publish --no-daemon
