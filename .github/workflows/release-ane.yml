# Publish the per-bucket, palettized ANE (Core ML) encoder packages to a GitHub
# Release.
#
# Manual (`workflow_dispatch`) — run once per blessed model revision. Produces the
# ladder of fixed-window encoders the macOS ANE backend downloads: for each mel
# bucket a FP16 mlprogram, palettized 6-bit (per_grouped_channel, group_size 32),
# saved as `gigaam_v3_encoder_<N>.mlpackage`. Per-bucket FIXED windows keep
# ~99.8 % of ops resident on the Neural Engine (a single EnumeratedShapes package
# evicts dynamic partitions to the CPU), so the Rust side pads each clip's mel up
# to the smallest bucket >= its length, runs the matching package, then trims.
#
# Each `.mlpackage` is written by the convert script as a deterministic
# uncompressed `.tar` (`gigaam_v3_encoder_<N>.mlpackage.tar`) and attached to the
# release alongside a `SHA256SUMS.txt`. That `.tar` IS the published + downloaded
# artifact, so its SHA-256 is simultaneously the content-identity fingerprint AND
# the value the Rust downloader pins (one artifact, one digest — no zip). If a
# re-conversion ever diverges, the pinned constants AND the release `tag` must be
# bumped together (the printed checksums below are the reconciliation point).
#
# Conversion needs Apple's Core ML tooling, so this runs on macOS. No release is
# created unless `publish` is true; otherwise the artifacts are only uploaded to
# the workflow run for inspection.
name: Release ANE

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'ANE model release tag'
        required: true
        default: 'ane-v3-2026-06-24'
      publish:
        description: 'Create/attach the GitHub release (false = build + upload run artifacts only)'
        type: boolean
        required: true
        default: false

permissions:
  contents: write

jobs:
  publish-ane:
    runs-on: macos-14
    env:
      # GitHub Actions forbids referencing `secrets.*` directly in `if:`, so
      # hoist the presence check into an env var (mirrors release-model.yml).
      HAS_MINISIGN_KEY: ${{ secrets.MINISIGN_SECRET_KEY != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v7

      # Validate the dispatch tag early. The input is passed via env (never
      # interpolated into the script body) so a hostile tag can't inject shell.
      - name: Validate tag format
        env:
          TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          [[ "$TAG" =~ ^ane-v3- ]] || { echo "::error ::tag must match ane-v3-*"; exit 1; }

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      # Build the per-bucket palettized encoders. uv pins Python 3.12 and pulls
      # the conversion deps (torch + coremltools + gigaam) on the fly. The GigaAM
      # source tree ships in the package, so GIGAAM_REPO is unset and the script
      # imports the installed `gigaam` package directly. The script writes both
      # the unpacked `.mlpackage` and the deterministic `.mlpackage.tar` (the
      # published asset) per bucket into OUT_DIR and prints each .tar's SHA-256.
      - name: Convert + palettize per-bucket ANE encoders
        env:
          OUT_DIR: ${{ runner.temp }}/ane
          GIGAAM_REPO: ${{ runner.temp }}/GigaAM
        run: |
          set -euo pipefail
          mkdir -p "$OUT_DIR"
          # gigaam v3 models (v3_rnnt, …) live only in the GitHub source, not the
          # stale PyPI release — but the git package metadata pins numpy==2.*,
          # which conflicts with the coremltools/numpy<2 stack. So clone the
          # pinned upstream source and import it via GIGAAM_REPO (sys.path, taken
          # by the convert script), while the PyPI `gigaam` supplies the
          # numpy<2-compatible runtime deps. This is the exact setup that produced
          # the validated local packages.
          git clone --quiet https://github.com/salute-developers/GigaAM.git "$GIGAAM_REPO"
          git -C "$GIGAAM_REPO" checkout --quiet 85558932f047bf80d03f2b2e9dc2584c26e8bda6
          uv run --python 3.12 \
            --with torch --with coremltools --with gigaam \
            --with soundfile --with scikit-learn --with "numpy<2" \
            python scripts/convert_gigaam_ane.py \
              --buckets 512,768,1536,3000 --nbits 6 --out-dir "$OUT_DIR"

      # The convert script already wrote one deterministic `.tar` per bucket
      # (the single published asset that reconstructs the .mlpackage dir on the
      # Rust side); just stage them into dist/.
      - name: Package artifacts
        env:
          OUT_DIR: ${{ runner.temp }}/ane
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "$OUT_DIR"/gigaam_v3_encoder_*.mlpackage.tar dist/
          ls -la dist

      - name: Aggregate SHA256SUMS.txt
        working-directory: dist
        run: |
          set -euo pipefail
          : > SHA256SUMS.txt
          for f in *.tar; do
            (sha256sum "$f" 2>/dev/null || shasum -a 256 "$f") >> SHA256SUMS.txt
          done
          echo "::notice ::Pin these per-bucket .tar SHA-256 digests in ANE_TAR_CHECKSUMS on the Rust side (one digest per bucket = content identity = download pin):"
          cat SHA256SUMS.txt

      # minisign signatures over every asset + the checksum file. The signing
      # secret is injected via repo secrets; when absent the step is skipped so
      # the pipeline still publishes (mirrors release-model.yml).
      - name: Sign bundle with minisign
        if: env.HAS_MINISIGN_KEY == 'true'
        working-directory: dist
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          set -euo pipefail
          # Keep the secret key OUT of dist/ (never uploaded) and shred it on any
          # exit path, success or failure.
          trap 'rm -f "$RUNNER_TEMP/minisign.key"' EXIT
          brew install minisign
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$RUNNER_TEMP/minisign.key"
          chmod 600 "$RUNNER_TEMP/minisign.key"
          for f in *.tar SHA256SUMS.txt; do
            [ -f "$f" ] || continue
            printf '%s\n' "$MINISIGN_PASSWORD" | minisign -Sm "$f" -s "$RUNNER_TEMP/minisign.key"
          done

      - name: Warn on missing minisign secret
        if: env.HAS_MINISIGN_KEY != 'true'
        run: echo "::warning ::MINISIGN_SECRET_KEY not configured — ANE artefacts will not carry minisign signatures."

      # Always upload the build to the workflow run so a dry-run (publish=false)
      # still yields inspectable artifacts.
      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ane-encoders-${{ github.event.inputs.tag }}
          path: |
            dist/*.tar
            dist/SHA256SUMS.txt
            dist/*.minisig
          if-no-files-found: error

      - name: Publish release
        if: ${{ github.event.inputs.publish == 'true' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: GigaAM v3 ANE encoder packages (${{ github.event.inputs.tag }})
          body: |
            Per-bucket palettized Core ML encoder packages for the macOS ANE backend.
            One deterministic uncompressed `gigaam_v3_encoder_<N>.mlpackage.tar` per
            mel bucket (512 / 768 / 1536 / 3000); the Rust side downloads the `.tar` and
            unpacks it to reconstruct the `.mlpackage` directory. FP16 mlprogram +
            6-bit palettization (per_grouped_channel, group_size 32). Verify with
            `SHA256SUMS.txt` — each `.tar` digest is the value pinned on the Rust side.
          files: |
            dist/*.tar
            dist/SHA256SUMS.txt
            dist/*.minisig
