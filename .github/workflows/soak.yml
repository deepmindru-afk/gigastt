name: Nightly Soak

# Nightly soak + load sanity check. Runs on schedule so pool drift,
# descriptor leaks, and memory growth surface outside the fast-CI envelope.
# Also triggerable on demand via workflow_dispatch for hotfix verification.

on:
  schedule:
    # 03:17 UTC daily — off-peak for GitHub runners. Skewed minute keeps the
    # job off the same slot as release/CI bursts.
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      duration_secs:
        description: 'Soak duration (seconds). Default 300 (~5 min).'
        required: false
        default: '300'

concurrency:
  group: soak-${{ github.ref }}
  cancel-in-progress: false

jobs:
  soak:
    runs-on: ubuntu-latest
    name: Soak (${{ github.event.inputs.duration_secs || 300 }}s)
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      # Separate shared-key: soak builds --release and must not evict the
      # debug artefacts that ci.yml's `ci` family populates (and vice-versa).
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cache model
        id: cache-model
        uses: actions/cache@v5
        with:
          path: ~/.gigastt/models
          key: gigastt-model-v3-onnx-${{ hashFiles('crates/gigastt-core/src/model/mod.rs') }}

      - name: Download model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: cargo run -p gigastt -- download

      - name: Run soak test
        env:
          GIGASTT_SOAK_DURATION_SECS: ${{ github.event.inputs.duration_secs || '300' }}
          RUST_BACKTRACE: '1'
        run: cargo test --release -p gigastt --test soak_test -- --ignored --nocapture --test-threads=1 > soak.log 2>&1

      - name: Run load tests
        env:
          RUST_BACKTRACE: '1'
        run: cargo test --release -p gigastt --test load_test -- --ignored --test-threads=1

      - name: Upload test artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-logs-${{ github.run_id }}
          path: |
            soak.log
          if-no-files-found: ignore
          retention-days: 14

  fuzz:
    # Continuous fuzzing: ci.yml only builds the targets, so the actual input
    # exploration happens here nightly. All four targets run on synthetic /
    # raw-byte input (no model on disk required).
    runs-on: ubuntu-latest
    name: Continuous Fuzz (60s/target)
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: fuzz
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-directories: fuzz/target

      # RUSTUP_TOOLCHAIN overrides the stable pin in rust-toolchain.toml so the
      # nightly `-Z sanitizer` flags are accepted; the explicit gnu target keeps
      # the musl-built cargo-fuzz binary from defaulting to an unbuildable musl.
      - name: Run fuzz targets (60s each)
        env:
          RUSTUP_TOOLCHAIN: nightly
        run: |
          for target in audio_decode protocol_parse pcm16_framing tokenizer; do
            echo "::group::fuzz $target"
            cargo fuzz run "$target" --target x86_64-unknown-linux-gnu -- -max_total_time=60 -rss_limit_mb=4096
            echo "::endgroup::"
          done

      - name: Upload crash artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ github.run_id }}
          path: fuzz/artifacts/
          if-no-files-found: ignore
          retention-days: 14
