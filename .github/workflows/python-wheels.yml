# Build + publish Python wheels for gigastt (UniFFI bindings via maturin).
#
# Manual (`workflow_dispatch`). UniFFI Python is ctypes-based, so each wheel is
# `py3-none-<platform>` — one wheel per platform across all Python 3.x (no
# per-version matrix). onnxruntime is statically linked (ort default), so the
# wheel is self-contained; the ~215 MB model is side-loaded at runtime.
#
#   pip install gigastt
#   import gigastt_uniffi as g
name: Python Wheels

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to PyPI (requires MATURIN_PYPI_TOKEN)'
        type: boolean
        default: false

defaults:
  run:
    working-directory: crates/gigastt-uniffi

jobs:
  wheels:
    name: Wheel ${{ matrix.platform }}
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-latest
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
            manylinux: '2_28'
          - host: ubuntu-24.04-arm
            platform: linux-aarch64
            target: aarch64-unknown-linux-gnu
            manylinux: '2_28'
          - host: macos-14
            platform: macos-arm64
            target: aarch64-apple-darwin
          # x86_64-apple-darwin (Intel Mac) omitted: ort provides no prebuilt
          # onnxruntime for that target (build-from-source only). Matches the
          # release.yml stance — Intel-Mac users `pip install` from sdist/source.
          - host: windows-latest
            platform: windows-x64
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      # protoc for non-Linux hosts (Linux gets it inside the manylinux container
      # via before-script-linux below).
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/gigastt-uniffi
          target: ${{ matrix.target }}
          # `--release` honours the workspace LTO profile; `-b uniffi` is also in
          # pyproject but passed explicitly for clarity.
          args: --release --out dist -b uniffi
          manylinux: ${{ matrix.manylinux }}
          # Download a protoc binary matching the container arch (manylinux_2_28
          # has no protobuf-compiler package). Runs before each Linux build.
          before-script-linux: |
            set -eu
            # manylinux_2_28 (AlmaLinux 8) is a minimal image. ort-sys's
            # build-time onnxruntime downloader (ureq -> native-tls) links
            # openssl on Linux, so it needs openssl-devel + pkgconfig; unzip is
            # for protoc. These are BUILD-only deps — the runtime wheel/.so does
            # not link openssl (verified: openssl-sys is a build-dependency of
            # ort-sys only). Ubuntu/macOS runners ship these, manylinux does not.
            (dnf install -y openssl-devel pkgconfig unzip || yum install -y openssl-devel pkgconfig unzip)
            PV=25.1
            case "$(uname -m)" in
              x86_64) PA=x86_64 ;;
              aarch64) PA=aarch_64 ;;
              *) echo "unsupported arch $(uname -m)"; exit 1 ;;
            esac
            curl -fsSL -o /tmp/protoc.zip \
              "https://github.com/protocolbuffers/protobuf/releases/download/v${PV}/protoc-${PV}-linux-${PA}.zip"
            unzip -o /tmp/protoc.zip -d /usr/local
            protoc --version

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform }}
          path: crates/gigastt-uniffi/dist/*.whl
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: wheels
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    env:
      HAS_PYPI_TOKEN: ${{ secrets.MATURIN_PYPI_TOKEN != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: wheels
          pattern: wheel-*
          merge-multiple: true
      - name: List wheels
        working-directory: wheels
        run: ls -la
      - name: Warn on missing PyPI token
        if: env.HAS_PYPI_TOKEN != 'true'
        run: echo "::warning ::MATURIN_PYPI_TOKEN not configured — skipping PyPI publish."
      - name: Publish
        if: env.HAS_PYPI_TOKEN == 'true'
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.MATURIN_PYPI_TOKEN }}
        with:
          command: upload
          args: --skip-existing wheels/*.whl
