name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.5.1)'
        required: true

permissions:
  contents: write
  # Signed build provenance attestations require the GitHub-issued
  # id-token for Sigstore + write access to the `attestations` API.
  id-token: write
  attestations: write
  # GHCR push (docker-publish job) authenticates with GITHUB_TOKEN, which
  # needs `packages: write` to push image tags to the registry.
  packages: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            features: coreml
            asset_suffix: aarch64-apple-darwin
            cuda: false
          - name: linux-x86_64-cpu
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: ""
            asset_suffix: x86_64-unknown-linux-gnu
            cuda: false
            ffi: true
            offline: true
            deb: true
          - name: linux-aarch64-cpu
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            features: ""
            asset_suffix: aarch64-unknown-linux-gnu
            cuda: false
            ffi: true
            offline: true
            # Cross-compiled on x86_64 via gcc-aarch64-linux-gnu (see the
            # "Install aarch64 cross-linker" step). Relies on a prebuilt
            # aarch64 onnxruntime being fetched by `ort` (download-binaries);
            # fail-fast: false isolates this target if that ever regresses.
          # x86_64-apple-darwin (Intel Mac) is intentionally omitted: GitHub is
          # retiring the macos-13 Intel runners and they no longer schedule — the
          # job sat queued 1.5h+ without ever starting, blocking the whole release.
          # Intel-Mac users install via `cargo install gigastt` (builds from
          # source). Re-add an Intel entry if hosted Intel runners return.
          - name: windows-x86_64-cpu
            os: windows-latest
            target: x86_64-pc-windows-msvc
            features: ""
            asset_suffix: x86_64-pc-windows-msvc
            cuda: false
            # protoc installed via choco (see "Install protoc"). Relies on a
            # prebuilt x86_64 Windows onnxruntime in `ort` (download-binaries).
          # linux-x86_64-cuda is intentionally omitted until the CUDA install
          # path is stabilized (Jimver/cuda-toolkit breaks on ubuntu-latest for
          # 12.4.x package names). Tracked in specs/todo.md.
    steps:
      - uses: actions/checkout@v7

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # `build.rs` invokes `prost-build` which shells out to `protoc`.
      # Both GitHub-hosted macos and ubuntu images need it installed
      # explicitly via the platform package manager.
      - name: Install protoc
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install protobuf
          elif [ "$RUNNER_OS" = "Windows" ]; then
            choco install protoc -y
          else
            sudo apt-get update && sudo apt-get install -y protobuf-compiler
          fi

      # aarch64-unknown-linux-gnu is cross-compiled on an x86_64 runner; cargo
      # needs the GNU cross-linker plus the aarch64 libstdc++ (g++-*), since
      # onnxruntime/polyvoice link `-lstdc++`, and the matching linker env var.
      - name: Install aarch64 cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Install CUDA toolkit
        if: matrix.cuda
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.4.1'
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev"]'

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.asset_suffix }}

      - name: Build release
        shell: bash
        env:
          FEATURES: ${{ matrix.features }}
        run: |
          if [ -n "$FEATURES" ]; then
            cargo build --release --locked --target ${{ matrix.target }} -p gigastt --features "$FEATURES"
          else
            cargo build --release --locked --target ${{ matrix.target }} -p gigastt
          fi

      - name: Package tarball
        id: package
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          SUFFIX: ${{ matrix.asset_suffix }}
          TARGET: ${{ matrix.target }}
        run: |
          VERSION="${TAG#v}"
          ASSET="gigastt-${VERSION}-${SUFFIX}.tar.gz"

          STAGE="$(mktemp -d)"
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp "target/${TARGET}/release/gigastt.exe" "$STAGE/gigastt.exe"
          else
            cp "target/${TARGET}/release/gigastt" "$STAGE/gigastt"
          fi
          cp LICENSE NOTICE README.md CHANGELOG.md "$STAGE/" 2>/dev/null || true

          tar -C "$STAGE" -czf "$ASSET" .
          sha256sum "$ASSET" > "${ASSET}.sha256" 2>/dev/null || shasum -a 256 "$ASSET" > "${ASSET}.sha256"

          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
          echo "sha_file=${ASSET}.sha256" >> "$GITHUB_OUTPUT"
          ls -la "$ASSET" "${ASSET}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: gigastt-${{ matrix.asset_suffix }}
          path: |
            ${{ steps.package.outputs.asset }}
            ${{ steps.package.outputs.sha_file }}
          if-no-files-found: error
          retention-days: 7

      # Embedding tarball: the gigastt-ffi C-ABI shared + static libraries and
      # the cbindgen-generated C header, for embedding gigastt on ARM servers /
      # Raspberry Pi / any C/C++/Swift host. onnxruntime is statically linked
      # into both libs, so the tarball is self-contained. Built only for the
      # Linux targets (matrix.ffi); flows into the same SHA256SUMS / SBOM / SLSA
      # / minisign / release pipeline as the binary tarballs via the *.tar.gz
      # globs in the publish job (no publish-job change needed).
      - name: Build FFI library
        if: matrix.ffi
        shell: bash
        run: cargo build --release --locked --target ${{ matrix.target }} -p gigastt-ffi

      - name: Package FFI tarball
        id: package_ffi
        if: matrix.ffi
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          SUFFIX: ${{ matrix.asset_suffix }}
          TARGET: ${{ matrix.target }}
        run: |
          VERSION="${TAG#v}"
          ASSET="gigastt-ffi-${VERSION}-${SUFFIX}.tar.gz"
          STAGE="$(mktemp -d)"
          mkdir -p "$STAGE/lib" "$STAGE/include"
          cp "target/${TARGET}/release/libgigastt_ffi.so" "$STAGE/lib/"
          cp "target/${TARGET}/release/libgigastt_ffi.a" "$STAGE/lib/"
          # build.rs (cbindgen) regenerates the C header at this path.
          cp crates/gigastt-ffi/include/gigastt.h "$STAGE/include/"
          cp LICENSE NOTICE README.md "$STAGE/" 2>/dev/null || true
          tar -C "$STAGE" -czf "$ASSET" .
          sha256sum "$ASSET" > "${ASSET}.sha256" 2>/dev/null || shasum -a 256 "$ASSET" > "${ASSET}.sha256"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
          echo "sha_file=${ASSET}.sha256" >> "$GITHUB_OUTPUT"
          ls -la "$ASSET" "${ASSET}.sha256"

      - name: Upload FFI artifact
        if: matrix.ffi
        uses: actions/upload-artifact@v4
        with:
          name: gigastt-ffi-${{ matrix.asset_suffix }}
          path: |
            ${{ steps.package_ffi.outputs.asset }}
            ${{ steps.package_ffi.outputs.sha_file }}
          if-no-files-found: error
          retention-days: 7

      # Offline all-in-one tarball: binary + pre-quantized INT8 model bundle +
      # RUPunct punctuation model + install.sh + hardened systemd unit, for
      # air-gapped sites that cannot fetch models from HuggingFace/GitHub at
      # install time. Linux only (deb targets are Linux-first: Astra / ALT /
      # RED OS via the tarball). Flows into the same SHA256SUMS / SLSA /
      # minisign / release pipeline via the *.tar.gz globs in the publish job.
      - name: Fetch offline model files
        if: matrix.offline || matrix.deb
        shell: bash
        run: scripts/fetch_offline_models.sh "${{ runner.temp }}/offline-models"

      - name: Build offline bundle
        if: matrix.offline
        id: package_offline
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          SUFFIX: ${{ matrix.asset_suffix }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          ASSET="gigastt-${VERSION}-offline-${SUFFIX}.tar.gz"
          scripts/build_offline_bundle.sh \
            --version "$VERSION" \
            --suffix "$SUFFIX" \
            --binary "target/${TARGET}/release/gigastt" \
            --models "${{ runner.temp }}/offline-models" \
            --output .
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
          echo "sha_file=${ASSET}.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload offline bundle artifact
        if: matrix.offline
        uses: actions/upload-artifact@v4
        with:
          name: gigastt-offline-${{ matrix.asset_suffix }}
          path: |
            ${{ steps.package_offline.outputs.asset }}
            ${{ steps.package_offline.outputs.sha_file }}
          if-no-files-found: error
          retention-days: 7

      # Debian packages (x86_64 only — Astra Linux / ALT / Ubuntu are amd64
      # first; aarch64 users take the offline tarball):
      #   gigastt_<ver>_amd64.deb        binary + systemd unit + /etc/gigastt
      #                                  env example, built by cargo-deb from
      #                                  [package.metadata.deb]
      #   gigastt-model-int8_<ver>_all.deb  arch-independent model data
      #                                  (/usr/share/gigastt/models/), built by
      #                                  scripts/build_model_deb.sh
      # Both flow into the publish job via the *.deb globs there.
      - name: Install cargo-deb + dpkg-dev
        if: matrix.deb
        shell: bash
        run: |
          set -euo pipefail
          # dpkg-dev provides dpkg-shlibdeps, which cargo-deb needs to resolve
          # the `$auto` Depends list.
          sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg-dev
          cargo install --locked --version 3.7.0 cargo-deb

      - name: Build deb packages
        if: matrix.deb
        id: package_deb
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          # cargo-deb remaps target/release asset paths to the --target dir;
          # the binary was already produced by the "Build release" step.
          DEB="gigastt_${VERSION}_amd64.deb"
          cargo deb --no-build --target "$TARGET" -p gigastt --output "$DEB"
          sha256sum "$DEB" > "${DEB}.sha256"
          MODEL_DEB="gigastt-model-int8_${VERSION}_all.deb"
          scripts/build_model_deb.sh \
            --version "$VERSION" \
            --models "${{ runner.temp }}/offline-models" \
            --output "$MODEL_DEB"
          sha256sum "$MODEL_DEB" > "${MODEL_DEB}.sha256"
          echo "deb=$DEB" >> "$GITHUB_OUTPUT"
          echo "model_deb=$MODEL_DEB" >> "$GITHUB_OUTPUT"
          ls -la "$DEB" "$MODEL_DEB"

      - name: Upload deb artifacts
        if: matrix.deb
        uses: actions/upload-artifact@v4
        with:
          name: gigastt-deb-${{ matrix.asset_suffix }}
          path: |
            ${{ steps.package_deb.outputs.deb }}
            ${{ steps.package_deb.outputs.deb }}.sha256
            ${{ steps.package_deb.outputs.model_deb }}
            ${{ steps.package_deb.outputs.model_deb }}.sha256
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    env:
      # GitHub Actions forbids referencing `secrets.*` in `if:` conditions
      # directly; expose presence as a boolean env var at job scope instead.
      HAS_MINISIGN_KEY: ${{ secrets.MINISIGN_SECRET_KEY != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Aggregate SHA256SUMS.txt
        shell: bash
        working-directory: dist
        run: |
          : > SHA256SUMS.txt
          for f in *.tar.gz *.deb; do
            [ -e "$f" ] || continue
            (sha256sum "$f" 2>/dev/null || shasum -a 256 "$f") >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt

      # CycloneDX SBOM for the published tag. Generated from the
      # workspace Cargo.lock so consumers can audit exactly which crate
      # versions went into the released binary. Output name matches the
      # release tag so GitHub's asset resolver can find it verbatim.
      - name: Install Rust toolchain for SBOM generation
        uses: dtolnay/rust-toolchain@stable

      - name: Generate CycloneDX SBOM
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          cargo install --locked --version 0.5.5 cargo-cyclonedx
          VERSION="${TAG#v}"
          # cargo-cyclonedx writes `<crate>.cdx.json` next to Cargo.toml.
          cargo cyclonedx --format json --spec-version 1.5 --manifest-path crates/gigastt/Cargo.toml
          mkdir -p dist
          # Pin the artifact name to the release tag for reproducibility.
          cp crates/gigastt/gigastt.cdx.json "dist/gigastt-${VERSION}.cdx.json"
          ls -la "dist/gigastt-${VERSION}.cdx.json"

      # SLSA build provenance attestation. Every artefact in
      # `dist/` gets a signed in-toto provenance statement anchored to
      # this workflow run. Downstream consumers verify with
      # `gh attestation verify <file> --repo ekhodzitsky/gigastt`.
      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.deb
            dist/SHA256SUMS.txt
            dist/*.cdx.json

      # minisign signatures for tarballs + debs + SHA256SUMS.txt. The
      # signing secret is injected via the `MINISIGN_SECRET_KEY` and
      # `MINISIGN_PASSWORD` repository secrets. When the secret is not
      # configured (forks, preview runs), the step degrades to a warning
      # so we don't break the release pipeline — minisign is added to
      # the release asset list only if signing succeeds.
      - name: Sign artifacts + SHA256SUMS with minisign
        if: env.HAS_MINISIGN_KEY == 'true'
        id: minisign
        shell: bash
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        working-directory: dist
        run: |
          set -euo pipefail
          # Install system `minisign` (apt-cacher is fast) — it accepts the
          # passphrase on stdin when stdout is not a TTY, which is exactly
          # what we need in CI. `rsign2` 0.6 does not expose a
          # non-interactive password flag, so we avoid it here.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends minisign
          printf '%s\n' "$MINISIGN_SECRET_KEY" > minisign.key
          chmod 600 minisign.key
          for f in *.tar.gz *.deb SHA256SUMS.txt *.cdx.json; do
            [ -f "$f" ] || continue
            # `-S` = sign; `-s` = secret key; `-c` = comment; `-t` = trusted
            # comment (appears in `-Vm` output). Pipe the password so
            # minisign reads it from stdin instead of prompting.
            printf '%s\n' "$MINISIGN_PASSWORD" | \
              minisign -Sm "$f" -s minisign.key \
                -c "gigastt release $(basename "$f")" \
                -t "gigastt $(basename "$f") ${{ steps.tag.outputs.tag }}"
          done
          shred -u minisign.key 2>/dev/null || rm -f minisign.key
          ls -la ./*.minisig
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Warn on missing minisign secret
        if: env.HAS_MINISIGN_KEY != 'true'
        shell: bash
        run: |
          echo "::warning ::MINISIGN_SECRET_KEY not configured — release artefacts will not carry minisign signatures."

      - name: Create / update release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.deb
            dist/SHA256SUMS.txt
            dist/*.cdx.json
            dist/*.minisig

  # Publishes container images to GHCR so consumers can `docker pull
  # ghcr.io/ekhodzitsky/gigastt:<version>` instead of building from source.
  # Intentionally NOT a dependency of `publish` (and vice-versa): a registry
  # hiccup must never block the binary GitHub release, and a binary failure
  # must never block the image push — the two release channels stand alone.
  docker-publish:
    name: Publish container images (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve version
        id: version
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      # QEMU registers binfmt handlers so the linux/arm64 CPU image can be
      # cross-built on the x86_64 runner. Not needed for the amd64-only CUDA
      # image below, but harmless to set up once here.
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # CPU image: multi-arch (amd64 + arm64) so it runs on both x86_64 servers
      # and arm64 hosts (Apple Silicon, Graviton). `ekhodzitsky/gigastt` is
      # already lowercase, which GHCR requires. Layer cache shares the same
      # ghcr.io buildcache ref the CI docker-build job warms on every main push.
      # Baking the model into the image is available via
      # `--build-arg GIGASTT_BAKE_MODEL=1` for users who want zero cold-start;
      # we don't publish a baked tag here because it would balloon the image by
      # ~850 MB.
      - name: Build + push CPU image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/ekhodzitsky/gigastt:${{ steps.version.outputs.version }}
            ghcr.io/ekhodzitsky/gigastt:latest
          labels: |
            org.opencontainers.image.source=https://github.com/ekhodzitsky/gigastt
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/ekhodzitsky/gigastt-buildcache:cpu
          cache-to: type=registry,ref=ghcr.io/ekhodzitsky/gigastt-buildcache:cpu,mode=max

      # CUDA image: amd64 only — the nvidia/cuda base images and the CUDA EP
      # are x86_64-only, so an arm64 variant cannot be built.
      - name: Build + push CUDA image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.cuda
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/ekhodzitsky/gigastt:${{ steps.version.outputs.version }}-cuda
            ghcr.io/ekhodzitsky/gigastt:cuda
          labels: |
            org.opencontainers.image.source=https://github.com/ekhodzitsky/gigastt
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/ekhodzitsky/gigastt-buildcache:cuda
          cache-to: type=registry,ref=ghcr.io/ekhodzitsky/gigastt-buildcache:cuda,mode=max
