name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    name: Format
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    name: Clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --workspace --all-targets -- -D warnings -A dead_code

  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo test --workspace --lib --bins
      # Model-free self-test of the WER regression-gate decision logic. The full
      # benchmark is model-gated (skipped in PR CI), so this exercises the
      # gate's comparison / boundary / null-baseline handling on every PR.
      - run: cargo test --test benchmark -- --self-test
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - run: cargo nextest run --workspace --lib --bins --retries 2

  build-coreml:
    runs-on: macos-14
    name: Build (CoreML)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: brew install protobuf
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo build --release -p gigastt --features coreml

      # Runtime smoke (main push only — the model is ~850 MB). Issue #42:
      # CoreML sessions can load fine and still fail at prediction time, so
      # a plain `cargo build` check is not enough. The smoke also fails when
      # the engine silently falls back to the CPU EP, because that would
      # mean the CoreML path regressed even though transcription still works.
      - name: Cache model
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: cache-model
        uses: actions/cache@v5
        with:
          path: ~/.gigastt/models
          key: gigastt-model-v3-onnx-${{ hashFiles('crates/gigastt-core/src/model/mod.rs') }}

      - name: Download model
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.cache-model.outputs.cache-hit != 'true'
        run: ./target/release/gigastt download

      - name: CoreML runtime smoke
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        timeout-minutes: 20
        run: |
          set -uo pipefail
          RUST_LOG=warn ./target/release/gigastt transcribe \
            crates/gigastt/tests/fixtures/golos_00.wav >transcript.txt 2>stderr.log
          status=$?
          echo "--- stderr ---"; cat stderr.log
          echo "--- transcript ---"; cat transcript.txt
          if [ "$status" -ne 0 ]; then
            echo "::error::CoreML inference failed (exit $status)"
            exit 1
          fi
          if grep -q "falling back to CPU execution provider" stderr.log; then
            echo "::error::CoreML EP fell back to CPU at runtime — CoreML path regressed"
            exit 1
          fi
          if ! grep -q "тенге" transcript.txt; then
            echo "::error::Transcript does not contain the expected reference text"
            exit 1
          fi

  build-cuda:
    runs-on: ubuntu-latest
    name: Build (CUDA)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo build --release -p gigastt --features cuda

  build-diarization:
    runs-on: ubuntu-latest
    name: Build (Diarization)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo build --release -p gigastt --features diarization

  e2e-tests:
    # Only run on main push — PRs get fast feedback from unit tests + clippy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    name: E2E Tests
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cache model
        id: cache-model
        uses: actions/cache@v5
        with:
          path: ~/.gigastt/models
          key: gigastt-model-v3-onnx-${{ hashFiles('crates/gigastt-core/src/model/mod.rs') }}

      - name: Download model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: cargo run -p gigastt -- download

      - name: Run e2e tests
        run: cargo test -p gigastt --test e2e_rest --test e2e_ws --test e2e_errors --test e2e_shutdown --test e2e_rate_limit -- --ignored --test-threads=1
        timeout-minutes: 30

  benchmark:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [e2e-tests]
    runs-on: ubuntu-latest
    name: WER Benchmark
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cache model
        id: cache-model
        uses: actions/cache@v5
        with:
          path: ~/.gigastt/models
          key: gigastt-model-v3-onnx-${{ hashFiles('crates/gigastt-core/src/model/mod.rs') }}

      - name: Download model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: cargo run -p gigastt -- download

      - name: Run WER benchmark
        run: cargo test -p gigastt --test benchmark -- --ignored 2>&1 | tee benchmark_output.txt

      - name: Check WER threshold
        run: |
          THRESHOLD=$(cat .github/wer-threshold.txt | tr -d '[:space:]')
          WER=$(sed -n 's/.*WER: \([0-9.]*\)%.*/\1/p' benchmark_output.txt | head -1)
          if [ -z "$WER" ]; then
            echo "ERROR: Could not extract WER from benchmark output"
            exit 1
          fi
          echo "WER: ${WER}%, Threshold: ${THRESHOLD}%"
          if awk "BEGIN {exit !($WER > $THRESHOLD)}"; then
            echo "FAIL: WER ${WER}% exceeds threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "PASS: WER ${WER}% is within threshold ${THRESHOLD}%"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_output.txt

  semver:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Semver Checks
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          # coreml+cuda are mutually exclusive; --all-features is impossible.
          feature-group: default-features
          # Check only the published *library* crates' API stability. `gigastt`
          # is a server binary / `cargo install` target whose Rust library
          # surface (ServerConfig, RuntimeLimits, http handlers) is an internal
          # implementation detail, not a semver contract — adding config fields
          # to it must not force a workspace-wide major bump.
          exclude: gigastt

  coverage:
    runs-on: ubuntu-latest
    name: Coverage
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # Default features only — coreml+cuda is a hard compile_error, so
      # `--all-features` is impossible here (unlike single-crate repos).
      - name: Run unit coverage
        # `--lib --bins` excludes integration test targets so the badge reflects
        # production-code coverage, not test-code lines.
        run: |
          cargo llvm-cov --no-report --workspace --lib --bins
          cargo llvm-cov report --cobertura --output-path cobertura-unit.xml
      - uses: codecov/codecov-action@v7
        with:
          files: ./cobertura-unit.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  audit:
    runs-on: ubuntu-latest
    name: Security Audit
    steps:
      - uses: actions/checkout@v4
      # `rustsec/audit-check` ships a prebuilt cargo-audit, saving the ~90 s
      # `cargo install --locked` rebuild on every PR run.
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    runs-on: ubuntu-latest
    name: Cargo Deny
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # Default `check` covers licenses + advisories + bans + sources.
          # An earlier attempt passed them as `arguments: licenses advisories …`,
          # but the stable-musl `cargo-deny` refused the trailing positional
          # args as subcommands (`unrecognized subcommand 'licenses'`).
          command: check

  typos:
    runs-on: ubuntu-latest
    name: Typos
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1

  dependency-review:
    # PR-only: compares the PR's dependency delta against the base branch,
    # so it has nothing to diff on a direct push to main.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Dependency Review
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: low
          comment-summary-in-pr: on-failure
          # Mirrors the allowlist enforced by `deny.toml` so a new transitive
          # dep with an off-list license fails review instead of slipping in.
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Zlib, CC0-1.0, MPL-2.0, OpenSSL, Unicode-3.0, Unicode-DFS-2016, CDLA-Permissive-2.0

  docs:
    runs-on: ubuntu-latest
    name: Doc Build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build docs (deny warnings)
        run: cargo doc --no-deps --workspace
        env:
          RUSTDOCFLAGS: -D warnings

  hack:
    runs-on: ubuntu-latest
    name: Feature Powerset
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # coreml+cuda is a hard compile_error and nnapi is Android-only, so the
      # platform execution-provider features are excluded from the powerset.
      - run: cargo hack check --feature-powerset --workspace --exclude-features coreml,cuda,nnapi --locked

  publish-dry-run:
    runs-on: ubuntu-latest
    name: Publish Dry Run
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo publish --dry-run -p gigastt-core --locked

  msrv:
    runs-on: ubuntu-latest
    name: MSRV (1.88)
    steps:
      - uses: actions/checkout@v4
      # MSRV floor: edition 2024 needs >=1.85, is_multiple_of needs >=1.87,
      # ort 2.0.0-rc.12 declares rust-version 1.88. NB: a warm cargo cache can
      # mask a too-new dependency MSRV here — the ort 1.88 floor was only
      # caught by the cold-registry Docker build, while this job stayed green.
      - uses: dtolnay/rust-toolchain@1.88
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo check --workspace --locked

  fuzz:
    runs-on: ubuntu-latest
    name: Fuzz Build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: fuzz
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-directories: fuzz/target
      # rust-toolchain.toml pins stable repo-wide; RUSTUP_TOOLCHAIN overrides it
      # so cargo-fuzz's nightly `-Z sanitizer` flags are accepted. Force the gnu
      # target because the musl-built cargo-fuzz binary otherwise defaults to a
      # musl target that has no prebuilt onnxruntime / sanitizer runtime.
      - name: Build fuzz targets
        run: cargo fuzz build --target x86_64-unknown-linux-gnu
        env:
          RUSTUP_TOOLCHAIN: nightly

  bench:
    # PR-only: criterion needs a main baseline to diff against, and the
    # regression gate is meaningless on the very push that moves main.
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'dependabot/')
    runs-on: ubuntu-latest
    name: Benchmarks (regression gate)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Save baseline from main
        # Branch refs are untrusted input — pass them through env vars rather
        # than interpolating into the shell directly (script-injection guard).
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git stash --include-untracked || true
          git checkout "$BASE_REF"
          cargo bench -p gigastt-core --features __internals -- --save-baseline main || true
          git checkout "$HEAD_REF"
          git stash pop || true

      - name: Run benchmarks
        run: cargo bench -p gigastt-core --features __internals -- --baseline main 2>&1 | tee benchmark.log

      - name: Check for performance regressions (>5%)
        run: |
          python3 - <<'PY'
          import re, sys

          with open("benchmark.log") as f:
              log = f.read()

          # Criterion prints `change: [lo% mid% hi%]` followed by
          # `Performance has regressed.` for confirmed slowdowns. Gate on the
          # lower confidence bound so we only fail when we're confident the
          # slowdown actually exceeds the threshold.
          pattern = re.compile(
              r"change:\s+\[([+\-][\d.]+)%\s+[+\-][\d.]+%\s+[+\-][\d.]+%\]"
              r"[^\n]*\n\s*Performance has regressed\."
          )

          THRESHOLD = 5.0
          regressions = [
              (m.group(0).splitlines()[0].strip(), float(m.group(1)))
              for m in pattern.finditer(log)
              if float(m.group(1)) > THRESHOLD
          ]

          if regressions:
              print(f"Performance regressions exceeding {THRESHOLD}% detected:")
              for line, lower in regressions:
                  print(f"  {line} (lower bound +{lower}%)")
              sys.exit(1)
          print(f"No performance regressions exceeding {THRESHOLD}% threshold.")
          PY

      - name: Upload criterion report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-report
          path: target/criterion/
          if-no-files-found: ignore

  coverage-e2e:
    # E2E coverage runs only on main because it needs the ~850 MB model and
    # serial execution (--test-threads=1), which makes the job slow (~20 min).
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [e2e-tests]
    runs-on: ubuntu-latest
    name: Coverage (E2E)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cache model
        id: cache-model
        uses: actions/cache@v5
        with:
          path: ~/.gigastt/models
          key: gigastt-model-v3-onnx-${{ hashFiles('crates/gigastt-core/src/model/mod.rs') }}

      - name: Download model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: cargo run -p gigastt -- download

      - name: Generate test WAV
        run: |
          # Create a minimal 1-second silent WAV for CLI transcribe coverage
          python3 -c "
          import struct, wave, io
          data = io.BytesIO()
          with wave.open(data, 'wb') as w:
            w.setnchannels(1)
            w.setsampwidth(2)
            w.setframerate(16000)
            w.writeframes(b'\x00' * 32000)
          with open('/tmp/test_silence.wav', 'wb') as f:
            f.write(data.getvalue())
          "

      - name: Run e2e coverage
        # Run each integration test target sequentially with `--no-report` so
        # coverage data accumulates in target/llvm-cov-target, then generate a
        # single Cobertura report. `cargo-llvm-cov` has lower overhead than
        # tarpaulin and is more stable for timing-sensitive e2e tests.
        #
        # We also run ignored lib+bin tests (model-dependent unit tests) and
        # exercise CLI commands to push coverage toward 90 %.
        run: |
          cargo llvm-cov --no-report --workspace --lib --bins -- --ignored --test-threads=1
          cargo llvm-cov --no-report -p gigastt --test e2e_rest     -- --ignored --test-threads=1
          cargo llvm-cov --no-report -p gigastt --test e2e_ws       -- --ignored --test-threads=1
          cargo llvm-cov --no-report -p gigastt --test e2e_errors   -- --ignored --test-threads=1
          cargo llvm-cov --no-report -p gigastt --test e2e_shutdown -- --ignored --test-threads=1
          cargo llvm-cov --no-report -p gigastt --test e2e_rate_limit -- --ignored --test-threads=1
          cargo llvm-cov --no-report run -p gigastt -- --help || true
          cargo llvm-cov --no-report run -p gigastt -- serve --help || true
          cargo llvm-cov --no-report run -p gigastt -- download || true
          cargo llvm-cov --no-report run -p gigastt -- quantize --force || true
          cargo llvm-cov --no-report run -p gigastt -- transcribe /tmp/test_silence.wav || true
          cargo llvm-cov report --cobertura --output-path cobertura-e2e.xml

      - uses: codecov/codecov-action@v7
        with:
          files: ./cobertura-e2e.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  docker-changes:
    # Detects whether a PR touches anything the Docker images are built from,
    # so `docker-build` only spends a runner when packaging could have changed.
    runs-on: ubuntu-latest
    name: Docker Paths
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docker:
              - 'Dockerfile*'
              - 'benchmark/Dockerfile'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**/Cargo.toml'
              - 'crates/**/build.rs'
              - 'crates/gigastt-core/proto/**'
              - 'rust-toolchain.toml'

  docker-build:
    # Dockerfiles rot silently unless CI builds them: an MSRV drift in the
    # builder pin and a phantom COPY both shipped unnoticed before this job
    # existed. PRs build the CPU image only when docker-relevant paths change;
    # every main push rebuilds it unconditionally as the safety net.
    needs: docker-changes
    if: github.event_name == 'push' || needs.docker-changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    name: Docker Build (CPU)
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # The layer cache lives in ghcr.io (free for public repos), keeping the
      # 10 GB Actions cache budget untouched. GITHUB_TOKEN grants packages:read
      # on PRs (forks included), so warm reads work everywhere; writes happen
      # on main pushes only. An unreadable cache ref is a soft warning — the
      # build goes cold, it never fails.
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: gigastt:ci
          cache-from: type=registry,ref=ghcr.io/ekhodzitsky/gigastt-buildcache:cpu
          cache-to: ${{ github.event_name == 'push' && 'type=registry,ref=ghcr.io/ekhodzitsky/gigastt-buildcache:cpu,mode=max' || '' }}
      - name: Smoke test (--version)
        run: |
          docker run --rm gigastt:ci --version | tee version.out
          grep -E '^gigastt [0-9]+\.[0-9]+\.[0-9]+' version.out

  docker-build-extras:
    # Main push only: the CUDA + benchmark images exist to catch packaging
    # rot, not to gate PRs. No GPU is needed — the CUDA EP is link-time only;
    # the build just pulls the multi-GB nvidia base image.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Docker Build (${{ matrix.name }})
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cuda
            dockerfile: Dockerfile.cuda
          - name: benchmark
            dockerfile: benchmark/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        # The nvidia/cuda devel base (~8 GB) plus a release target dir plus
        # the buildx cache export overflow the ~14 GB free on a stock runner.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h /
      - uses: docker/setup-buildx-action@v3
      # Layer cache in ghcr.io — rationale in docker-build above. This job is
      # main-push-only, so the cache is always written back.
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: false
          tags: gigastt-${{ matrix.name }}:ci
          cache-from: type=registry,ref=ghcr.io/ekhodzitsky/gigastt-buildcache:${{ matrix.name }}
          cache-to: type=registry,ref=ghcr.io/ekhodzitsky/gigastt-buildcache:${{ matrix.name }},mode=max
