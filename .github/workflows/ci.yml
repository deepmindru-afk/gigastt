name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    name: Format
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    name: Clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo clippy --workspace --all-targets -- -D warnings -A dead_code

  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo test --workspace --lib --bins
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - run: cargo nextest run --workspace --lib --bins --retries 2

  build-coreml:
    runs-on: macos-14
    name: Build (CoreML)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: brew install protobuf
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release -p gigastt --features coreml

  build-cuda:
    runs-on: ubuntu-latest
    name: Build (CUDA)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release -p gigastt --features cuda

  build-diarization:
    runs-on: ubuntu-latest
    name: Build (Diarization)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release -p gigastt --features diarization

  e2e-tests:
    # Only run on main push — PRs get fast feedback from unit tests + clippy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    name: E2E Tests
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: ~/.gigastt/models
          key: gigastt-model-v3-onnx-${{ hashFiles('crates/gigastt-core/src/model/mod.rs') }}

      - name: Download model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: cargo run -p gigastt -- download

      - name: Run e2e tests
        run: cargo test -p gigastt --test e2e_rest --test e2e_ws --test e2e_errors --test e2e_shutdown --test e2e_rate_limit -- --ignored --test-threads=1
        timeout-minutes: 30

  benchmark:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [e2e-tests]
    runs-on: ubuntu-latest
    name: WER Benchmark
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: ~/.gigastt/models
          key: gigastt-model-v3-onnx-${{ hashFiles('crates/gigastt-core/src/model/mod.rs') }}

      - name: Download model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: cargo run -p gigastt -- download

      - name: Run WER benchmark
        run: cargo test -p gigastt --test benchmark -- --ignored 2>&1 | tee benchmark_output.txt

      - name: Check WER threshold
        run: |
          THRESHOLD=$(cat .github/wer-threshold.txt | tr -d '[:space:]')
          WER=$(sed -n 's/.*WER: \([0-9.]*\)%.*/\1/p' benchmark_output.txt | head -1)
          if [ -z "$WER" ]; then
            echo "ERROR: Could not extract WER from benchmark output"
            exit 1
          fi
          echo "WER: ${WER}%, Threshold: ${THRESHOLD}%"
          if awk "BEGIN {exit !($WER > $THRESHOLD)}"; then
            echo "FAIL: WER ${WER}% exceeds threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "PASS: WER ${WER}% is within threshold ${THRESHOLD}%"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_output.txt

  semver:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Semver Checks
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          # coreml+cuda are mutually exclusive; --all-features is impossible.
          feature-group: default-features

  coverage:
    runs-on: ubuntu-latest
    name: Coverage
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      # Default features only — coreml+cuda is a hard compile_error, so
      # `--all-features` is impossible here (unlike single-crate repos).
      - name: Run tarpaulin
        # Floor only — the unit-test-only run measures ~19.8% (model-gated
        # inference/server paths are exercised by the --ignored e2e suite,
        # which has no model here). --fail-under guards against regressions.
        run: cargo tarpaulin --workspace --out xml --timeout 120 --fail-under 18 --skip-clean
      - uses: codecov/codecov-action@v4
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  audit:
    runs-on: ubuntu-latest
    name: Security Audit
    steps:
      - uses: actions/checkout@v4
      # `rustsec/audit-check` ships a prebuilt cargo-audit, saving the ~90 s
      # `cargo install --locked` rebuild on every PR run.
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    runs-on: ubuntu-latest
    name: Cargo Deny
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # Default `check` covers licenses + advisories + bans + sources.
          # An earlier attempt passed them as `arguments: licenses advisories …`,
          # but the stable-musl `cargo-deny` refused the trailing positional
          # args as subcommands (`unrecognized subcommand 'licenses'`).
          command: check

  typos:
    runs-on: ubuntu-latest
    name: Typos
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1

  dependency-review:
    # PR-only: compares the PR's dependency delta against the base branch,
    # so it has nothing to diff on a direct push to main.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Dependency Review
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: low
          comment-summary-in-pr: on-failure
          # Mirrors the allowlist enforced by `deny.toml` so a new transitive
          # dep with an off-list license fails review instead of slipping in.
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Zlib, CC0-1.0, MPL-2.0, OpenSSL, Unicode-3.0, Unicode-DFS-2016, CDLA-Permissive-2.0

  docs:
    runs-on: ubuntu-latest
    name: Doc Build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build docs (deny warnings)
        run: cargo doc --no-deps --workspace
        env:
          RUSTDOCFLAGS: -D warnings

  hack:
    runs-on: ubuntu-latest
    name: Feature Powerset
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      # coreml+cuda is a hard compile_error and nnapi is Android-only, so the
      # platform execution-provider features are excluded from the powerset.
      - run: cargo hack check --feature-powerset --workspace --exclude-features coreml,cuda,nnapi --locked

  publish-dry-run:
    runs-on: ubuntu-latest
    name: Publish Dry Run
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo publish --dry-run -p gigastt-core --locked

  msrv:
    runs-on: ubuntu-latest
    name: MSRV (1.87)
    steps:
      - uses: actions/checkout@v4
      # MSRV floor: edition 2024 needs >=1.85, is_multiple_of needs >=1.87.
      - uses: dtolnay/rust-toolchain@1.87
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo check --workspace --locked

  fuzz:
    runs-on: ubuntu-latest
    name: Fuzz Build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            fuzz/target
          key: ${{ runner.os }}-cargo-fuzz-${{ hashFiles('**/Cargo.lock') }}
      # rust-toolchain.toml pins stable repo-wide; RUSTUP_TOOLCHAIN overrides it
      # so cargo-fuzz's nightly `-Z sanitizer` flags are accepted. Force the gnu
      # target because the musl-built cargo-fuzz binary otherwise defaults to a
      # musl target that has no prebuilt onnxruntime / sanitizer runtime.
      - name: Build fuzz targets
        run: cargo fuzz build --target x86_64-unknown-linux-gnu
        env:
          RUSTUP_TOOLCHAIN: nightly

  bench:
    # PR-only: criterion needs a main baseline to diff against, and the
    # regression gate is meaningless on the very push that moves main.
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'dependabot/')
    runs-on: ubuntu-latest
    name: Benchmarks (regression gate)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Save baseline from main
        # Branch refs are untrusted input — pass them through env vars rather
        # than interpolating into the shell directly (script-injection guard).
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git stash --include-untracked || true
          git checkout "$BASE_REF"
          cargo bench -p gigastt-core --features __internals -- --save-baseline main || true
          git checkout "$HEAD_REF"
          git stash pop || true

      - name: Run benchmarks
        run: cargo bench -p gigastt-core --features __internals -- --baseline main 2>&1 | tee benchmark.log

      - name: Check for performance regressions (>5%)
        run: |
          python3 - <<'PY'
          import re, sys

          with open("benchmark.log") as f:
              log = f.read()

          # Criterion prints `change: [lo% mid% hi%]` followed by
          # `Performance has regressed.` for confirmed slowdowns. Gate on the
          # lower confidence bound so we only fail when we're confident the
          # slowdown actually exceeds the threshold.
          pattern = re.compile(
              r"change:\s+\[([+\-][\d.]+)%\s+[+\-][\d.]+%\s+[+\-][\d.]+%\]"
              r"[^\n]*\n\s*Performance has regressed\."
          )

          THRESHOLD = 5.0
          regressions = [
              (m.group(0).splitlines()[0].strip(), float(m.group(1)))
              for m in pattern.finditer(log)
              if float(m.group(1)) > THRESHOLD
          ]

          if regressions:
              print(f"Performance regressions exceeding {THRESHOLD}% detected:")
              for line, lower in regressions:
                  print(f"  {line} (lower bound +{lower}%)")
              sys.exit(1)
          print(f"No performance regressions exceeding {THRESHOLD}% threshold.")
          PY

      - name: Upload criterion report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-report
          path: target/criterion/
          if-no-files-found: ignore
