name: Android FFI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-ffi:
    runs-on: ubuntu-latest
    name: Check FFI (lean build)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo check -p gigastt-ffi

  build-android:
    runs-on: ubuntu-latest
    name: Build Android (arm64)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: android
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build libgigastt_ffi.so (arm64)
        run: |
          cargo ndk \
            -t arm64-v8a \
            -o ./target/android \
            build --release -p gigastt-ffi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libgigastt_ffi-arm64
          path: target/android/arm64-v8a/libgigastt_ffi.so
