[advisories]
version = 2
yanked = "deny"
ignore = [
    # `paste` (RUSTSEC-2024-0436): unmaintained, but pulled in transitively by
    # the `tokenizers` crate (used by the punctuation-restoration pass). It is a
    # compile-time-only proc-macro with no runtime surface, so the unmaintained
    # advisory carries no runtime risk. Revisit if `tokenizers` drops it.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "Unicode-3.0",
    "ISC",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-DFS-2016",
    # webpki-root-certs is just the Mozilla CA bundle; CDLA-Permissive-2.0
    # is a community-data license that behaves like MIT for us.
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-git = "deny"
unknown-registry = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
