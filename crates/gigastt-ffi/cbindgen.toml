language = "C"
include_guard = "GIGASTT_H"
autogen_warning = "/* Auto-generated by cbindgen. Do not edit. */"

# NOTE: do NOT add `[export] prefix` or `[fn] prefix`. The exported functions are
# already named `gigastt_*` (via `#[unsafe(no_mangle)]`) and the opaque structs
# are already named `Gigastt*` in Rust. cbindgen's `[fn] prefix` prepends its
# value as a leading token before each function *declaration* (i.e. before the
# return type), producing an uncompilable header like
# `gigastt_ struct GigasttEngine *gigastt_engine_new(...)`; `[export] prefix`
# double-prefixed the structs to `GigasttGigasttEngine`. Both broke the C header
# (it failed `clang -fsyntax-only`), which a Swift clang module / any C consumer
# cannot wrap. Keep the generated header valid C.
