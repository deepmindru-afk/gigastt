openapi: 3.1.0

info:
  title: gigastt REST API
  version: "1.0"
  description: |
    Offline and streaming speech-to-text REST API powered by GigaAM v3 (rnnt head by default).
    On-device Russian speech recognition via ONNX Runtime.

    ## Endpoints

    - **Health & discovery**: `GET /health`, `GET /v1/models`
    - **File transcription**: `POST /v1/transcribe` — upload audio, receive full transcript
    - **Streaming transcription**: `POST /v1/transcribe/stream` — upload audio, receive SSE stream of partial/final segments

    Prometheus metrics are optional (behind `--metrics`) and exposed on a
    separate listener (default `127.0.0.1:9090`, override via `--metrics-listen`),
    not on this API surface.

    ## Audio Formats

    Supported upload formats: WAV, MP3, M4A/AAC, OGG/Vorbis, FLAC.
    All formats are decoded server-side via [symphonia](https://github.com/pdeljanov/Symphonia)
    and resampled to 16 kHz mono.

    ## Limits

    All defaults are configurable via CLI flags or environment variables
    (see `gigastt serve --help`):

    - `--body-limit-bytes` (default 50 MiB) — max upload size
    - `--pool-size` (default 2) — concurrent inference sessions
    - `--rate-limit-per-minute` (default 0 = off) — per-IP token bucket
    - File transcription cap: 10 minutes of audio
    - Pool saturation: REST returns `503 Service Unavailable` + `Retry-After: 30`

    ## Error Responses

    All error responses follow a consistent JSON schema:

    ```json
    {
      "error": "Human-readable description",
      "code": "machine_readable_code"
    }
    ```

    Common HTTP status codes:

    | Status | Code | Meaning |
    |--------|------|---------|
    | 400 | `empty_body` | Request body is empty |
    | 413 | `payload_too_large` | Body exceeds `--body-limit-bytes` |
    | 422 | `transcription_error` | Audio decoded but inference failed |
    | 422 | `invalid_audio` | Audio could not be decoded |
    | 429 | `rate_limited` | Per-IP rate limit exceeded |
    | 503 | `timeout` | Pool saturated; retry after `Retry-After` |
    | 503 | `pool_closed` | Server shutting down |
    | 504 | `inference_timeout` | A single inference run exceeded `--inference-timeout-secs` |
  license:
    name: MIT
    url: https://github.com/ekhodzitsky/gigastt/blob/main/LICENSE
  contact:
    name: gigastt
    url: https://github.com/ekhodzitsky/gigastt

servers:
  - url: http://127.0.0.1:9876
    description: Local development server (default)
  - url: http://0.0.0.0:9876
    description: Docker container

paths:
  /health:
    get:
      summary: Health check
      description: |
        Liveness check: returns 200 while the process is alive, along with the
        head actually loaded and the effective punctuation / ITN policy.
        Suitable for load balancer health checks and Docker `HEALTHCHECK`.

        During the first-run model download + INT8 quantization the listener is
        already bound and answers here with `model: "loading"` (so probes never
        see connection-refused); gate *readiness* on `GET /ready` instead.
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                model: gigaam-v3-rnnt
                variant: rnnt
                version: "2.11.2"
                punctuation: true
                itn: true

  /ready:
    get:
      summary: Readiness probe
      description: |
        Returns 200 when the engine session pool has capacity, 503 otherwise.
        Suitable for Kubernetes readiness probes and load-balancer gating.
      operationId: readinessCheck
      responses:
        "200":
          description: Engine pool is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
              example:
                status: ready
                pool_available: 2
                pool_total: 2
        "503":
          description: Engine pool is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
              example:
                status: not_ready
                pool_available: 0
                pool_total: 2
                reason: pool_exhausted

  /v1/models:
    get:
      summary: Model information
      description: |
        Returns metadata about the loaded model, including capabilities,
        pool status, and supported audio formats.
      operationId: getModelInfo
      responses:
        "200":
          description: Model metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelInfo"
              example:
                id: gigaam-v3-rnnt
                name: GigaAM v3 RNN-T
                variant: rnnt
                version: "2.11.2"
                encoder: int8
                vocab_size: 34
                sample_rate: 16000
                pool_size: 2
                pool_available: 2
                punctuation: true
                itn: true
                supported_formats:
                  - wav
                  - mp3
                  - m4a
                  - ogg
                  - flac
                supported_rates:
                  - 8000
                  - 16000
                  - 24000
                  - 44100
                  - 48000
                diarization: false

  /v1/transcribe:
    post:
      summary: Transcribe audio file
      description: |
        Upload an audio file and receive a complete transcription.
        Supports WAV, MP3, M4A/AAC, OGG/Vorbis, and FLAC.

        The default response is JSON. Alternative export formats are available
        via the `format` query parameter: `txt`, `srt`, `vtt`, `md`. Use
        `download` to send `Content-Disposition: attachment`.

        Pass `segments=true` to add a cue-grouped `segments` array to the default
        JSON response (same boundaries as the `srt` / `vtt` exports); combined
        with `format=md` it switches Markdown to `### [mm:ss]` segment headers.
        `txt` / `srt` / `vtt` ignore `segments` (already flat / cue-based).

        The entire file is processed in a single inference session.
        Max audio duration: 30 minutes.
      operationId: transcribeFile
      parameters:
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [json, txt, srt, vtt, md]
            default: json
          description: Export format for the transcription result.
        - name: download
          in: query
          required: false
          schema:
            type: string
          description: |
            Filename for the `Content-Disposition: attachment` header. If the
            value is empty, the server uses `transcript.<ext>`.
        - name: max_chars_per_line
          in: query
          required: false
          schema:
            type: integer
            default: 80
          description: Maximum characters per subtitle line (SRT/VTT). 0 = unlimited.
        - name: max_words_per_line
          in: query
          required: false
          schema:
            type: integer
            default: 14
          description: Maximum words per subtitle line (SRT/VTT). 0 = unlimited.
        - name: word_timestamps
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Include per-word timestamps in Markdown output.
        - name: segments
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: |
            Add a `segments` array to the default JSON response. Segments are
            grouped from word timestamps by pause (≈0.9 s), sentence-ending
            punctuation (`.`, `!`, `?`), speaker change, or a maximum segment
            length of ≈30 s. With `format=md` the same segments are rendered as
            `### [mm:ss]` section headers. Ignored for `txt` / `srt` / `vtt`.
        - name: punctuation
          in: query
          required: false
          schema:
            type: boolean
          description: |
            Per-request override for the punctuation / casing restoration pass.
            `true` forces it on, `false` skips it; absent = the server's boot
            policy (byte-unchanged response). `true` when no punctuation model is
            loaded returns `409 punctuation_not_available`. Applies to this
            endpoint only — the SSE / WebSocket paths never run this pass.
        - name: itn
          in: query
          required: false
          schema:
            type: boolean
          description: |
            Per-request override for inverse text normalization (number-words →
            digits). `true` / `false` force the state; absent = boot policy. Pure
            code (no model), so always accepted. This endpoint only.
        - name: vad
          in: query
          required: false
          schema:
            type: boolean
          description: |
            Per-request override for VAD silence-skipping. `true` decodes only
            detected speech regions (requires the server started with `--vad`;
            otherwise `409 vad_not_loaded`), `false` decodes the whole buffer;
            absent = boot policy. This endpoint only.
        - name: variant
          in: query
          required: false
          schema:
            type: string
            enum: [rnnt, e2e_rnnt, ml_ctc, ml_ctc_large]
          description: |
            Forward-compatibility guard naming the recognition head the request
            expects. A single-model server can't switch heads, so any value
            other than the loaded variant returns `409 variant_not_loaded`;
            matching or absent proceeds. This endpoint only.
        - name: channels
          in: query
          required: false
          schema:
            type: string
            enum: [split]
          description: >-
            Use `split` to transcribe the left and right channels as separate
            speakers (`speaker_0` and `speaker_1`). Defaults to mono mix.
        - name: diarization
          in: query
          required: false
          schema:
            type: boolean
          description: >-
            Set to `true` to request polyvoice speaker diarization. The
            mutual-exclusion check with `channels=split` treats `diarization=true`
            as an explicit request; returns 400 with code `conflicting_modes` if
            both are set. Actual diarization output requires the speaker-encoder
            model to be loaded on the server (downloaded automatically when the
            `diarization` feature is enabled).
      requestBody:
        required: true
        content:
          audio/wav:
            schema:
              type: string
              format: binary
          audio/mpeg:
            schema:
              type: string
              format: binary
          audio/mp4:
            schema:
              type: string
              format: binary
          audio/ogg:
            schema:
              type: string
              format: binary
          audio/flac:
            schema:
              type: string
              format: binary
          application/octet-stream:
            schema:
              type: string
              format: binary
            description: Raw audio bytes (format auto-detected)
      responses:
        "200":
          description: Transcription successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscribeResponse"
              example:
                text: "привет как дела"
                words:
                  - word: "привет"
                    start: 0.5
                    end: 0.8
                    speaker: 0
                  - word: "как"
                    start: 0.9
                    end: 1.0
                    speaker: 1
                  - word: "дела"
                    start: 1.1
                    end: 1.4
                    speaker: 0
                duration: 2.5
            text/plain:
              schema:
                type: string
              example: "привет как дела"
            application/x-subrip:
              schema:
                type: string
              example: |
                1
                00:00:00,000 --> 00:00:02,500
                привет как дела
            text/vtt:
              schema:
                type: string
              example: |
                WEBVTT

                00:00:00.000 --> 00:00:02.500
                привет как дела
            text/markdown:
              schema:
                type: string
              example: |
                ---
                duration: 2.5
                language: ru
                speakers: 0
                ---

                # Transcript

                привет как дела
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/OverrideConflict"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "422":
          $ref: "#/components/responses/TranscriptionError"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "504":
          $ref: "#/components/responses/GatewayTimeout"

  /v1/transcribe/stream:
    post:
      summary: Transcribe audio file (SSE streaming)
      description: |
        Upload an audio file and receive a stream of transcription results
        via Server-Sent Events (SSE). Results are emitted as partial and final
        segments as the audio is processed chunk-by-chunk.

        Each SSE event contains a JSON object with `type` discriminator:
        - `partial` — interim result (may change)
        - `final` — finalized utterance
        - `error` — processing error
      operationId: transcribeStream
      requestBody:
        required: true
        content:
          audio/wav:
            schema:
              type: string
              format: binary
          audio/mpeg:
            schema:
              type: string
              format: binary
          audio/mp4:
            schema:
              type: string
              format: binary
          audio/ogg:
            schema:
              type: string
              format: binary
          audio/flac:
            schema:
              type: string
              format: binary
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: SSE stream of transcription segments
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                data: {"type": "partial", "text": "привет", "timestamp": 1712700000.123, "words": [{"word": "привет", "start": 0.5, "end": 0.8}]}

                data: {"type": "final", "text": "привет как дела", "timestamp": 1712700001.456, "words": [{"word": "привет", "start": 0.5, "end": 0.8}, {"word": "как", "start": 0.9, "end": 1.0}, {"word": "дела", "start": 1.1, "end": 1.4}]}
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /v1/jobs:
    post:
      summary: Submit an asynchronous transcription job
      description: |
        Enqueue a long audio file for asynchronous transcription. The endpoint
        accepts the same body and query parameters as `POST /v1/transcribe`.
        When the job API is disabled (`--enable-jobs` not set), this path returns
        `404`.
      operationId: submitJob
      parameters:
        - $ref: "#/components/parameters/Format"
        - $ref: "#/components/parameters/WordTimestamps"
        - $ref: "#/components/parameters/Segments"
        - $ref: "#/components/parameters/Channels"
        - $ref: "#/components/parameters/Diarization"
        - $ref: "#/components/parameters/Punctuation"
        - $ref: "#/components/parameters/Itn"
        - $ref: "#/components/parameters/Vad"
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "202":
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobSubmitResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          description: Job queue is full
          headers:
            Retry-After:
              schema:
                type: integer
              description: Seconds to wait before retry
              example: 30
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Job queue is full"
                code: queue_full
                retry_after_ms: 30000
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /v1/jobs/{id}:
    get:
      summary: Poll job status and progress
      description: |
        Returns the current status of an asynchronous transcription job. When the
        job API is disabled, this path returns `404`.
      operationId: getJob
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatusResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    delete:
      summary: Cancel a queued or processing job
      description: |
        Cancels a job that is still `queued` or `processing`. Cancelling a queued
        job immediately frees its slot; cancelling a processing job stops result
        propagation but the in-flight triplet is released only when the worker
        finishes. When the job API is disabled, this path returns `404`.
      operationId: cancelJob
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Job cancelled
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Job cannot be cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Job cannot be cancelled"
                code: job_not_cancellable
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /v1/jobs/{id}/result:
    get:
      summary: Fetch the finished transcription
      description: |
        Returns the transcription result in the format requested at submission
        time. If the job has not finished, returns `409 job_not_finished`.
      operationId: getJobResult
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Transcription result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscribeResponse"
            text/plain:
              schema:
                type: string
            application/x-subrip:
              schema:
                type: string
            text/vtt:
              schema:
                type: string
            text/markdown:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Job is not finished
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Job is not finished"
                code: job_not_finished
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /v1/jobs/{id}/events:
    get:
      summary: SSE stream of job events
      description: |
        Server-Sent Events stream emitting `progress`, `done`, `failed`, and
        `cancelled` events. The stream closes automatically after a terminal
        event. When the job API is disabled, this path returns `404`.
      operationId: getJobEvents
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                data: {"type":"progress","percent":25,"processed_seconds":5.0}

                data: {"type":"done"}
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

components:
  parameters:
    Format:
      name: format
      in: query
      schema:
        type: string
        enum: [json, txt, srt, vtt, md]
      description: Export format for the finished result
    WordTimestamps:
      name: word_timestamps
      in: query
      schema:
        type: boolean
      description: Include per-word timestamps
    Segments:
      name: segments
      in: query
      schema:
        type: boolean
      description: Group words into natural-boundary segments
    Channels:
      name: channels
      in: query
      schema:
        type: string
        enum: [split]
      description: Transcribe left/right channels as separate speakers
    Diarization:
      name: diarization
      in: query
      schema:
        type: boolean
      description: Request speaker diarization
    Punctuation:
      name: punctuation
      in: query
      schema:
        type: string
        enum: [on, off, auto]
      description: Override punctuation policy
    Itn:
      name: itn
      in: query
      schema:
        type: string
        enum: [on, off, auto]
      description: Override inverse text normalization policy
    Vad:
      name: vad
      in: query
      schema:
        type: string
        enum: [on, off, auto]
      description: Override voice activity detection policy

  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - model
        - variant
        - version
        - punctuation
        - itn
      properties:
        status:
          type: string
          example: ok
          description: Service status
        model:
          type: string
          example: gigaam-v3-rnnt
          description: >-
            Stable identifier of the head actually loaded
            (`gigaam-v3-rnnt`, `gigaam-v3-e2e-rnnt`, `gigaam-multilingual-ctc`, or `gigaam-multilingual-large-ctc`). During first-run model
            download / quantization the bootstrap responder reports `loading`.
        variant:
          type: string
          enum: [rnnt, e2e_rnnt, ml_ctc, ml_ctc_large]
          example: rnnt
          description: Recognition head in use
        version:
          type: string
          example: "2.11.2"
          description: Server version (semver)
        punctuation:
          type: boolean
          example: true
          description: Whether the punctuation / casing restoration pass is active
        itn:
          type: boolean
          example: true
          description: Whether inverse text normalization (numbers → digits) is active

    ReadinessResponse:
      type: object
      required:
        - status
        - pool_available
        - pool_total
      properties:
        status:
          type: string
          enum: [ready, not_ready]
          example: ready
          description: Readiness status
        pool_available:
          type: integer
          example: 2
          description: Currently available inference sessions
        pool_total:
          type: integer
          example: 2
          description: Total inference session pool size
        reason:
          type: string
          enum: [pool_exhausted, shutting_down]
          example: pool_exhausted
          description: |
            Why the service is not ready. Present only when status is not_ready
            (pool_exhausted when all sessions are busy, shutting_down during drain).

    ModelInfo:
      type: object
      required:
        - id
        - name
        - variant
        - version
        - encoder
        - vocab_size
        - sample_rate
        - pool_size
        - pool_available
        - supported_formats
        - supported_rates
        - punctuation
        - itn
        - diarization
      properties:
        id:
          type: string
          example: gigaam-v3-rnnt
          description: >-
            Stable identifier of the head actually loaded
            (`gigaam-v3-rnnt`, `gigaam-v3-e2e-rnnt`, `gigaam-multilingual-ctc`, or `gigaam-multilingual-large-ctc`).
        name:
          type: string
          example: GigaAM v3 RNN-T
        variant:
          type: string
          enum: [rnnt, e2e_rnnt, ml_ctc, ml_ctc_large]
          example: rnnt
          description: Recognition head in use
        version:
          type: string
          example: "2.11.2"
        encoder:
          type: string
          enum: [fp32, int8]
          description: Encoder quantization type
        vocab_size:
          type: integer
          example: 34
        sample_rate:
          type: integer
          example: 16000
          description: Internal processing sample rate in Hz
        pool_size:
          type: integer
          example: 2
          description: Total inference session pool size
        pool_available:
          type: integer
          example: 2
          description: Currently available sessions
        supported_formats:
          type: array
          items:
            type: string
          example: [wav, mp3, m4a, ogg, flac]
          description: Supported audio upload formats
        supported_rates:
          type: array
          items:
            type: integer
          example: [8000, 16000, 24000, 44100, 48000]
          description: Supported input sample rates for WebSocket streaming
        punctuation:
          type: boolean
          example: true
          description: Whether the punctuation / casing restoration pass is active
        itn:
          type: boolean
          example: true
          description: Whether inverse text normalization (numbers → digits) is active
        diarization:
          type: boolean
          example: false
          description: Whether speaker diarization is available

    TranscribeResponse:
      type: object
      required:
        - text
        - words
        - duration
      properties:
        text:
          type: string
          example: "привет как дела"
          description: Full transcript text
        words:
          type: array
          items:
            $ref: "#/components/schemas/WordInfo"
          description: Word-level transcription with timestamps
        duration:
          type: number
          format: double
          example: 2.5
          description: Audio duration in seconds
        segments:
          type: array
          items:
            $ref: "#/components/schemas/Segment"
          description: |
            Transcript segments grouped from word timestamps. Present only when
            the request passed `segments=true`; omitted otherwise so existing
            clients are unaffected. Segments split on pause (≈0.9 s),
            sentence-ending punctuation (`.`, `!`, `?`), speaker change, or a
            maximum segment length of ≈30 s. With `format=md&segments=true`
            these same boundaries are rendered as `### [mm:ss]` sections.

    Segment:
      type: object
      required:
        - start
        - end
        - text
        - words
      properties:
        start:
          type: number
          format: double
          example: 0.0
          description: Segment start time in seconds (start of its first word)
        end:
          type: number
          format: double
          example: 2.5
          description: Segment end time in seconds (end of its last word)
        text:
          type: string
          example: "привет как дела"
          description: Rendered segment text
        words:
          type: array
          items:
            $ref: "#/components/schemas/WordInfo"
          description: The words that fall within this segment's span
        speaker:
          type: integer
          example: 0
          description: |
            Zero-based speaker index. Present only when the segment came from
            channel split (`channels=split`) or polyvoice diarization.

    WordInfo:
      type: object
      required:
        - word
        - start
        - end
      properties:
        word:
          type: string
          example: "привет"
          description: Recognized word
        start:
          type: number
          format: double
          example: 0.5
          description: Word start time in seconds
        end:
          type: number
          format: double
          example: 0.8
          description: Word end time in seconds
        speaker:
          type: integer
          description: Zero-based speaker index (only present when channel split or diarization produced speaker labels)

    JobSubmitResponse:
      type: object
      required:
        - job_id
        - status
        - created_at
      properties:
        job_id:
          type: string
          example: 018f...-
          description: Unique job identifier
        status:
          type: string
          enum: [queued]
          example: queued
        created_at:
          type: number
          example: 1712700000.5
          description: Unix timestamp (seconds with fractional part)

    JobStatusResponse:
      type: object
      required:
        - job_id
        - status
        - processed_seconds
        - percent
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [queued, processing, done, failed, cancelled]
        processed_seconds:
          type: number
          example: 12.5
          description: Seconds of audio considered processed so far
        percent:
          type: integer
          example: 42
          description: Approximate completion percentage (0-100)
        error:
          type: string
          example: "Transcription failed."
          description: Sanitized error message for failed jobs

    JobEvent:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [progress, done, failed, cancelled]
      discriminator:
        propertyName: type
        mapping:
          progress: "#/components/schemas/JobProgressEvent"
          done: "#/components/schemas/JobDoneEvent"
          failed: "#/components/schemas/JobFailedEvent"
          cancelled: "#/components/schemas/JobCancelledEvent"

    JobProgressEvent:
      allOf:
        - $ref: "#/components/schemas/JobEvent"
      type: object
      required:
        - type
        - percent
        - processed_seconds
      properties:
        type:
          type: string
          enum: [progress]
        percent:
          type: integer
          example: 42
        processed_seconds:
          type: number
          example: 12.5

    JobDoneEvent:
      allOf:
        - $ref: "#/components/schemas/JobEvent"
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [done]

    JobFailedEvent:
      allOf:
        - $ref: "#/components/schemas/JobEvent"
      type: object
      required:
        - type
        - error
      properties:
        type:
          type: string
          enum: [failed]
        error:
          type: string
          example: "Transcription failed."

    JobCancelledEvent:
      allOf:
        - $ref: "#/components/schemas/JobEvent"
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [cancelled]

    ErrorResponse:
      type: object
      required:
        - error
        - code
      properties:
        error:
          type: string
          example: "Request body exceeds the configured size limit"
          description: Human-readable error description
        code:
          type: string
          example: payload_too_large
          description: Machine-readable error code
        retry_after_ms:
          type: integer
          example: 30000
          description: |
            Suggested retry delay in milliseconds. Present only for transient
            backpressure errors (pool saturation).

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Empty request body"
            code: empty_body

    PayloadTooLarge:
      description: Request body too large
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Request body exceeds the configured size limit"
            code: payload_too_large

    TranscriptionError:
      description: Transcription failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Transcription failed. Check audio format."
            code: transcription_error

    OverrideConflict:
      description: |
        A per-request override requested a knob the server can't honour: a knob
        turned on without its backing resource loaded, or a `variant` that isn't
        the loaded head. Returned before any pool checkout (fail-fast).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            vad_not_loaded:
              summary: "?vad=true but the server has no VAD"
              value:
                error: "VAD requested but not loaded; start the server with --vad"
                code: vad_not_loaded
            punctuation_not_available:
              summary: "?punctuation=true but no punctuation model is loaded"
              value:
                error: "punctuation requested but no punctuation model is loaded"
                code: punctuation_not_available
            variant_not_loaded:
              summary: "?variant=<head> differs from the loaded head"
              value:
                error: "Requested model variant is not loaded"
                code: variant_not_loaded

    ServiceUnavailable:
      description: Server busy or shutting down
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retry
          example: 30
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            timeout:
              summary: Pool saturated
              value:
                error: "Server busy, try again later"
                code: timeout
                retry_after_ms: 30000
            pool_closed:
              summary: Graceful shutdown in progress
              value:
                error: "Server is shutting down"
                code: pool_closed

    TooManyRequests:
      description: Per-IP rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retry
          example: 30
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Too many requests"
            code: rate_limited
            retry_after_ms: 30000

    GatewayTimeout:
      description: Inference timed out
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Inference timed out."
            code: inference_timeout

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            job_not_found:
              summary: Unknown job id
              value:
                error: "Job not found"
                code: job_not_found
            jobs_disabled:
              summary: Job API is disabled
              value:
                error: "Job API is not enabled"
                code: jobs_disabled
